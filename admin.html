<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ada Sineklik - Admin Yönetimi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .admin-card { background: white; border-radius: 12px; border: 1px solid #e5e7eb; overflow: hidden; margin-bottom: 1.5rem; }
        .table-header { background-color: #1f2937; color: white; font-size: 11px; text-transform: uppercase; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 50; }
        .modal.active { display: flex; }
        #adminIcerik { display: none; } /* Giriş yapana kadar gizli */
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="loginForm" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-black text-gray-800">Admin Girişi</h2>
                <p class="text-gray-500 text-sm mt-2">Yönetim paneline erişmek için bilgilerinizi girin</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="adminUser" placeholder="Kullanıcı Adı" class="w-full border p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="adminPass" placeholder="Şifre" class="w-full border p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="girisYap()" class="w-full bg-gray-900 text-white py-3 rounded-xl font-bold hover:bg-black transition">Giriş Yap</button>
            </div>
            <p id="hataMesaji" class="text-red-500 text-center mt-4 text-sm hidden">Hatalı kullanıcı adı veya şifre!</p>
        </div>
    </div>

    <div id="adminIcerik" class="p-4 md:p-8">
        <div class="max-w-6xl mx-auto">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border">
                <div>
                    <h1 class="text-2xl font-black text-gray-800 tracking-tight">Admin Sipariş Yönetimi</h1>
                    <p class="text-sm text-gray-500">Tüm müşterilerin siparişlerini yönetin</p>
                </div>
                <div class="mt-4 md:mt-0 flex gap-3">
                    <button onclick="verileriYukle()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition">Yenile</button>
                    <button onclick="cikisYap()" class="bg-red-50 text-red-600 px-4 py-2 rounded-lg font-bold border border-red-100">Çıkış</button>
                </div>
            </div>

            <div id="adminSiparisListesi" class="space-y-4">
                </div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl mx-4">
            <h2 class="text-xl font-bold mb-6 text-gray-800 border-b pb-2">Siparişi Güncelle</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Satış Tutarı (TL)</label>
                    <input type="number" id="modalFiyat" class="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Sipariş Durumu</label>
                    <select id="modalDurum" class="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                        <option>Online Sipariş</option>
                        <option>Hazırlanıyor</option>
                        <option>Ölçü Alındı</option>
                        <option>Montaj Bekliyor</option>
                        <option>Tamamlandı</option>
                        <option>İptal Edildi</option>
                    </select>
                </div>
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="modalKapat()" class="flex-1 bg-gray-100 py-3 rounded-xl font-bold">Vazgeç</button>
                <button onclick="siparisGuncelle()" class="flex-1 bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700">Kaydet</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        // FIREBASE AYARLARI
        const firebaseConfig = {
            apiKey: "AIzaSyD5cilsAyJrzPzwtgIBd1w7StfAkUBAO7E",
            authDomain: "adasineklik-f8c9f.firebaseapp.com",
            projectId: "adasineklik-f8c9f",
            storageBucket: "adasineklik-f8c9f.firebasestorage.app",
            messagingSenderId: "612764827500",
            appId: "1:612764827500:web:5b11b94229a36336547d49"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const userPath = "adasineklik@54_com".replace(/\./g, '_');

        // ADMİN BİLGİLERİ (Buradan değiştirebilirsiniz)
        const ADMIN_USER = "admin";
        const ADMIN_PASS = "12345";

        let tumSiparisler = [];
        let seciliSiparisKodu = null;

        // GİRİŞ FONKSİYONU
        window.girisYap = () => {
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            const hata = document.getElementById('hataMesaji');

            if (user === ADMIN_USER && pass === ADMIN_PASS) {
                sessionStorage.setItem("adminLoggedIn", "true");
                panelGoster();
                verileriYukle();
            } else {
                hata.classList.remove('hidden');
            }
        };

        window.cikisYap = () => {
            sessionStorage.removeItem("adminLoggedIn");
            location.reload();
        };

        function panelGoster() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('adminIcerik').style.display = 'block';
        }

        // OTURUM KONTROLÜ
        if (sessionStorage.getItem("adminLoggedIn") === "true") {
            panelGoster();
            verileriYukle();
        }

        // VERİ YÜKLEME VE GÜNCELLEME (Önceki kodla aynı mantık)
        window.verileriYukle = async () => {
            const container = document.getElementById('adminSiparisListesi');
            try {
                const snap = await getDoc(doc(db, "Kullanicilar", userPath, "Veriler", "Siparisler"));
                if (snap.exists()) {
                    tumSiparisler = JSON.parse(snap.data().json_data || "[]");
                    container.innerHTML = tumSiparisler.map(sip => `
                        <div class="admin-card">
                            <div class="p-4 bg-gray-50 flex flex-wrap justify-between items-center border-b gap-4">
                                <div>
                                    <h3 class="font-bold text-gray-800 text-lg">${sip.musteriAdiSoyadi}</h3>
                                    <p class="text-xs text-gray-500 font-medium">${sip.telefon} | Kod: ${sip.siparisKodu}</p>
                                </div>
                                <div class="flex items-center gap-4">
                                    <div class="text-right">
                                        <span class="text-xs font-bold text-gray-400 block uppercase">Durum</span>
                                        <span class="font-bold text-blue-600">${sip.durum}</span>
                                    </div>
                                    <div class="text-right pr-4">
                                        <span class="text-xs font-bold text-gray-400 block uppercase">Tutar</span>
                                        <span class="font-black text-gray-800 text-lg">${Number(sip.toplamTutar).toLocaleString('tr-TR')} TL</span>
                                    </div>
                                    <button onclick="modalAc('${sip.siparisKodu}')" class="bg-gray-800 text-white px-4 py-2 rounded-lg font-bold text-sm">Düzenle</button>
                                </div>
                            </div>
                            <table class="w-full text-left text-sm">
                                <thead class="table-header">
                                    <tr><th class="px-4 py-2">Ürün</th><th class="px-4 py-2 text-center">Ölçü</th><th class="px-4 py-2 text-center">Adet</th></tr>
                                </thead>
                                <tbody class="divide-y">
                                    ${sip.urunler.map(u => `
                                        <tr>
                                            <td class="px-4 py-3 font-medium">${u.model} (${u.seri})<br><span class="text-[11px] text-gray-400">${u.renk} | ${u.yon}</span></td>
                                            <td class="px-4 py-3 text-center font-bold">${u.en}x${u.boy}</td>
                                            <td class="px-4 py-3 text-center font-bold">${u.adet} Ad.</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                            <div class="p-3 bg-white text-[11px] text-gray-400 italic"><b>Adres:</b> ${sip.adres || 'Belirtilmedi'}</div>
                        </div>
                    `).reverse().join(''); // En yeni sipariş en üstte
                }
            } catch (err) { console.error(err); }
        };

        window.modalAc = (kod) => {
            seciliSiparisKodu = kod;
            const siparis = tumSiparisler.find(s => s.siparisKodu === kod);
            document.getElementById('modalFiyat').value = siparis.toplamTutar;
            document.getElementById('modalDurum').value = siparis.durum;
            document.getElementById('editModal').classList.add('active');
        };

        window.modalKapat = () => document.getElementById('editModal').classList.remove('active');

        window.siparisGuncelle = async () => {
            const yeniFiyat = parseFloat(document.getElementById('modalFiyat').value) || 0;
            const yeniDurum = document.getElementById('modalDurum').value;
            const index = tumSiparisler.findIndex(s => s.siparisKodu === seciliSiparisKodu);
            
            if (index !== -1) {
                tumSiparisler[index].toplamTutar = yeniFiyat;
                tumSiparisler[index].durum = yeniDurum;
                try {
                    await setDoc(doc(db, "Kullanicilar", userPath, "Veriler", "Siparisler"), {
                        json_data: JSON.stringify(tumSiparisler)
                    });
                    modalKapat();
                    verileriYukle();
                } catch (err) { alert("Hata!"); }
            }
        };
    </script>
</body>
</html>
