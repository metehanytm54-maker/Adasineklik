<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ada Sineklik - Admin Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .admin-card { background: white; border-radius: 12px; border: 1px solid #e5e7eb; overflow: hidden; margin-bottom: 1.5rem; transition: all 0.3s; }
        .admin-card:hover { box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-color: #3b82f6; }
        .table-header { background-color: #1f2937; color: white; font-size: 11px; text-transform: uppercase; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 50; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border">
            <div>
                <h1 class="text-2xl font-black text-gray-800 tracking-tight">Admin Sipariş Yönetimi</h1>
                <p class="text-sm text-gray-500">Tüm müşterilerin siparişlerini yönetin</p>
            </div>
            <div class="mt-4 md:mt-0 flex gap-3">
                <button onclick="verileriYukle()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition">Listeyi Yenile</button>
                <button onclick="window.location.href='index.html'" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg font-bold">Panele Dön</button>
            </div>
        </div>

        <div id="adminSiparisListesi" class="space-y-4">
            <div class="text-center py-20 text-gray-400">Yükleniyor...</div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl mx-4">
            <h2 class="text-xl font-bold mb-6 text-gray-800 border-b pb-2">Siparişi Güncelle</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Satış Tutarı (TL)</label>
                    <input type="number" id="modalFiyat" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="0.00">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Sipariş Durumu</label>
                    <select id="modalDurum" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        <option>Online Sipariş</option>
                        <option>Hazırlanıyor</option>
                        <option>Ölçü Alındı</option>
                        <option>Montaj Bekliyor</option>
                        <option>Tamamlandı</option>
                        <option>İptal Edildi</option>
                    </select>
                </div>
            </div>

            <div class="flex gap-3 mt-8">
                <button onclick="modalKapat()" class="flex-1 bg-gray-100 text-gray-700 py-3 rounded-xl font-bold">Vazgeç</button>
                <button onclick="siparisGuncelle()" class="flex-1 bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 shadow-lg">Değişiklikleri Kaydet</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5cilsAyJrzPzwtgIBd1w7StfAkUBAO7E",
            authDomain: "adasineklik-f8c9f.firebaseapp.com",
            projectId: "adasineklik-f8c9f",
            storageBucket: "adasineklik-f8c9f.firebasestorage.app",
            messagingSenderId: "612764827500",
            appId: "1:612764827500:web:5b11b94229a36336547d49"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const userPath = "adasineklik@54_com".replace(/\./g, '_');

        let tumSiparisler = [];
        let seciliSiparisKodu = null;

        async function verileriYukle() {
            const container = document.getElementById('adminSiparisListesi');
            try {
                const snap = await getDoc(doc(db, "Kullanicilar", userPath, "Veriler", "Siparisler"));
                if (snap.exists()) {
                    tumSiparisler = JSON.parse(snap.data().json_data || "[]");
                    
                    container.innerHTML = tumSiparisler.map(sip => `
                        <div class="admin-card">
                            <div class="p-4 bg-gray-50 flex flex-wrap justify-between items-center border-b gap-4">
                                <div class="flex items-center gap-4">
                                    <div class="bg-gray-800 text-white p-2 rounded-lg text-xs font-bold">${sip.siparisKodu}</div>
                                    <div>
                                        <h3 class="font-bold text-gray-800">${sip.musteriAdiSoyadi}</h3>
                                        <p class="text-xs text-gray-500">${sip.telefon} - ${new Date(sip.olusturmaTarihi).toLocaleDateString('tr-TR')}</p>
                                    </div>
                                </div>
                                <div class="flex items-center gap-6">
                                    <div class="text-right">
                                        <p class="text-[10px] font-bold text-gray-400 uppercase">Durum</p>
                                        <span class="text-sm font-bold ${sip.durum === 'Tamamlandı' ? 'text-green-600' : 'text-blue-600'}">${sip.durum}</span>
                                    </div>
                                    <div class="text-right">
                                        <p class="text-[10px] font-bold text-gray-400 uppercase">Tutar</p>
                                        <p class="text-lg font-black text-gray-800">${sip.toplamTutar.toLocaleString('tr-TR')} TL</p>
                                    </div>
                                    <button onclick="modalAc('${sip.siparisKodu}')" class="bg-indigo-50 text-indigo-700 px-4 py-2 rounded-lg font-bold border border-indigo-100 hover:bg-indigo-600 hover:text-white transition">Düzenle</button>
                                </div>
                            </div>
                            
                            <table class="w-full text-left text-sm">
                                <thead class="table-header">
                                    <tr>
                                        <th class="px-4 py-2">Ürün Bilgisi</th>
                                        <th class="px-4 py-2 text-center">Ölçü</th>
                                        <th class="px-4 py-2 text-center">Adet</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y">
                                    ${sip.urunler.map(u => `
                                        <tr>
                                            <td class="px-4 py-3">
                                                <div class="font-bold">${u.model} (${u.seri})</div>
                                                <div class="text-[11px] text-gray-500">${u.renk} | ${u.yon} | ${u.tulCinsi}</div>
                                            </td>
                                            <td class="px-4 py-3 text-center font-bold text-gray-600">${u.en}x${u.boy}</td>
                                            <td class="px-4 py-3 text-center font-bold">${u.adet} Ad.</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                            <div class="p-3 bg-white text-[11px] text-gray-400 border-t italic">
                                <b>Adres:</b> ${sip.adres}
                            </div>
                        </div>
                    `).join('');
                }
            } catch (err) {
                container.innerHTML = "Hata: " + err.message;
            }
        }

        window.modalAc = (kod) => {
            seciliSiparisKodu = kod;
            const siparis = tumSiparisler.find(s => s.siparisKodu === kod);
            document.getElementById('modalFiyat').value = siparis.toplamTutar;
            document.getElementById('modalDurum').value = siparis.durum;
            document.getElementById('editModal').classList.add('active');
        };

        window.modalKapat = () => {
            document.getElementById('editModal').classList.remove('active');
        };

        window.siparisGuncelle = async () => {
            const yeniFiyat = parseFloat(document.getElementById('modalFiyat').value) || 0;
            const yeniDurum = document.getElementById('modalDurum').value;

            const index = tumSiparisler.findIndex(s => s.siparisKodu === seciliSiparisKodu);
            if (index !== -1) {
                tumSiparisler[index].toplamTutar = yeniFiyat;
                tumSiparisler[index].durum = yeniDurum;

                try {
                    await setDoc(doc(db, "Kullanicilar", userPath, "Veriler", "Siparisler"), {
                        json_data: JSON.stringify(tumSiparisler)
                    });
                    alert("Sipariş başarıyla güncellendi!");
                    modalKapat();
                    verileriYukle();
                } catch (err) {
                    alert("Güncelleme hatası: " + err.message);
                }
            }
        };

        verileriYukle();
    </script>
</body>
</html>
