<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ada Sineklik | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .admin-card { transition: all 0.2s; border: 1px solid #e2e8f0; }
        .admin-card:hover { border-color: #3b82f6; box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.1); }
        .modal { display: none; align-items: center; justify-content: center; position: fixed; inset: 0; z-index: 100; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
    </style>
</head>
<body class="text-slate-900">

    <nav class="bg-slate-900 text-white sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 px-3 py-1 rounded-lg font-black text-xs uppercase tracking-widest">Yönetici</div>
                <h1 class="text-xl font-black tracking-tighter">ADA SİNEKLİK PANEL</h1>
            </div>
            <div class="flex items-center gap-6">
                <div id="adminName" class="text-sm font-bold text-slate-400 italic">Yükleniyor...</div>
                <button id="btnLogout" class="bg-slate-800 hover:bg-red-600 px-4 py-2 rounded-xl text-xs font-bold transition">Çıkış Yap</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <div class="flex justify-between items-end mb-10">
            <div>
                <h2 class="text-3xl font-black text-slate-800 uppercase tracking-tighter">Tüm Siparişler</h2>
                <p class="text-slate-500 font-medium">Sistemdeki tüm müşteri taleplerini buradan yönetebilirsiniz.</p>
            </div>
            <div class="bg-white px-6 py-3 rounded-2xl border shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Toplam Sipariş</p>
                <p id="statTotal" class="text-2xl font-black text-blue-600">0</p>
            </div>
        </div>

        <div id="adminOrdersList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full py-20 text-center text-slate-400">Veriler senkronize ediliyor...</div>
        </div>
    </main>

    <div id="adminModal" class="modal p-4">
        <div class="bg-white w-full max-w-4xl rounded-[32px] overflow-hidden shadow-2xl">
            <div class="p-8 border-b bg-slate-50 flex justify-between items-center">
                <div>
                    <h4 class="text-xl font-black text-slate-800">Sipariş Yönetimi</h4>
                    <p id="modalClientInfo" class="text-sm text-blue-600 font-bold"></p>
                </div>
                <button onclick="closeAdminModal()" class="text-slate-400 hover:text-red-500 font-bold">KAPAT</button>
            </div>
            
            <div class="p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 overflow-y-auto max-h-[400px] pr-2">
                    <table class="w-full text-left">
                        <thead class="text-[10px] font-black text-slate-400 uppercase border-b">
                            <tr>
                                <th class="pb-3">Model/Tül</th>
                                <th class="pb-3 text-center">Ölçü</th>
                                <th class="pb-3 text-center">Adet</th>
                            </tr>
                        </thead>
                        <tbody id="modalItemsBody" class="text-sm font-medium">
                            </tbody>
                    </table>
                </div>

                <div class="bg-slate-50 p-6 rounded-3xl space-y-4">
                    <input type="hidden" id="currentOrderId">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase">Sipariş Durumu</label>
                        <select id="updateStatus" class="w-full p-3 mt-1 bg-white border rounded-xl font-bold outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="Beklemede">Beklemede</option>
                            <option value="Üretimde">Üretimde</option>
                            <option value="Tamamlandı">Tamamlandı</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase">Toplam Fiyat (₺)</label>
                        <input type="number" id="updatePrice" class="w-full p-3 mt-1 bg-white border rounded-xl font-black text-lg outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <button id="btnUpdateOrder" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-blue-700 transition">GÜNCELLE VE KAYDET</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, onSnapshot, orderBy, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5cilsAyJrzPzwtgIBd1w7StfAkUBAO7E",
            authDomain: "adasineklik-f8c9f.firebaseapp.com",
            projectId: "adasineklik-f8c9f",
            storageBucket: "adasineklik-f8c9f.firebasestorage.app",
            messagingSenderId: "612764827500",
            appId: "1:612764827500:web:5b11b94229a36336547d49"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Admin Kontrolü (Basit)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('adminName').innerText = "Yönetici: " + user.email;
                loadAllOrders();
            } else {
                window.location.href = "giris.html";
            }
        });

        // Tüm Siparişleri Yükle (Filtresiz)
        function loadAllOrders() {
            const q = query(collection(db, "siparisler"), orderBy("tarih", "desc"));
            
            onSnapshot(q, (snap) => {
                const list = document.getElementById('adminOrdersList');
                list.innerHTML = "";
                document.getElementById('statTotal').innerText = snap.size;

                snap.forEach(d => {
                    const s = d.data();
                    const date = s.tarih?.toDate().toLocaleDateString('tr-TR') || "-";
                    const statusColor = s.durum === "Beklemede" ? "bg-orange-100 text-orange-600" : s.durum === "Üretimde" ? "bg-blue-100 text-blue-600" : "bg-emerald-100 text-emerald-600";

                    list.innerHTML += `
                        <div class="admin-card bg-white p-6 rounded-[32px] flex flex-col justify-between">
                            <div class="flex justify-between items-start mb-4">
                                <div class="max-w-[70%]">
                                    <h4 class="text-sm font-black text-slate-800 truncate uppercase">${s.musteri}</h4>
                                    <p class="text-[10px] text-slate-400 font-bold italic">${date}</p>
                                </div>
                                <span class="text-[10px] px-3 py-1 rounded-full font-black uppercase ${statusColor}">${s.durum}</span>
                            </div>
                            
                            <div class="bg-slate-50 rounded-2xl p-4 flex justify-between items-center mb-4">
                                <div>
                                    <p class="text-[9px] font-bold text-slate-400 uppercase">Ürün Detayı</p>
                                    <p class="text-xs font-black">${s.kalemSayisi} Kalem / ${s.toplamAdet} Adet</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[9px] font-bold text-slate-400 uppercase">Belirlenen Fiyat</p>
                                    <p class="text-lg font-black text-slate-800 italic">₺ ${s.toplamFiyat || 0}</p>
                                </div>
                            </div>

                            <button onclick="openAdminModal('${d.id}')" class="w-full py-3 bg-slate-900 text-white rounded-xl text-xs font-bold hover:bg-blue-600 transition">
                                İNCELE VE FİYATLANDIR
                            </button>
                        </div>
                    `;
                });
            });
        }

        // Modal Aç ve Detayları Getir
        window.openAdminModal = async (id) => {
            const dSnap = await getDoc(doc(db, "siparisler", id));
            if (dSnap.exists()) {
                const s = dSnap.data();
                document.getElementById('currentOrderId').value = id;
                document.getElementById('modalClientInfo').innerText = s.musteri + " | " + s.musteriEmail;
                document.getElementById('updateStatus').value = s.durum;
                document.getElementById('updatePrice').value = s.toplamFiyat || 0;
                
                const body = document.getElementById('modalItemsBody');
                body.innerHTML = "";
                s.urunler.forEach(u => {
                    body.innerHTML += `
                        <tr class="border-b border-slate-50">
                            <td class="py-4">
                                <span class="font-bold">${u.model}</span><br>
                                <span class="text-[10px] text-slate-500">${u.renk} / ${u.tul}</span>
                            </td>
                            <td class="text-center font-bold text-slate-600">${u.en}x${u.boy}</td>
                            <td class="text-center font-black text-blue-600">${u.adet}</td>
                        </tr>
                    `;
                });
                document.getElementById('adminModal').classList.add('active');
            }
        };

        // Güncelleme İşlemi
        document.getElementById('btnUpdateOrder').addEventListener('click', async () => {
            const id = document.getElementById('currentOrderId').value;
            const status = document.getElementById('updateStatus').value;
            const price = parseFloat(document.getElementById('updatePrice').value);

            try {
                await updateDoc(doc(db, "siparisler", id), {
                    durum: status,
                    toplamFiyat: price
                });
                alert("Sipariş başarıyla güncellendi!");
                closeAdminModal();
            } catch (err) {
                alert("Hata: " + err.message);
            }
        });

        window.closeAdminModal = () => document.getElementById('adminModal').classList.remove('active');
        document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));
    </script>
</body>
</html>
