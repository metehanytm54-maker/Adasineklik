<div class="space-y-6">
    <div class="flex flex-col md:flex-row gap-4 justify-between items-center bg-slate-50 p-6 rounded-[25px] border">
        <input type="text" id="mSearch" oninput="listeyiYenile()" placeholder="Malzeme veya Seri ara..." class="w-full md:w-1/2 p-4 rounded-xl border outline-none focus:ring-2 ring-blue-400">
        <button onclick="yeniEkleAc()" class="w-full md:w-auto bg-slate-900 text-white px-8 py-4 rounded-xl font-bold hover:bg-blue-600 transition-all">+ YENİ MALZEME</button>
    </div>

    <div id="listeContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="col-span-full text-center py-10 text-slate-400 italic">Veriler yükleniyor...</div>
    </div>
</div>

<div id="editorDialog" class="hidden fixed inset-0 z-[1100] bg-slate-900/80 flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-lg rounded-[30px] p-8">
        <h3 id="edBaslik" class="font-black text-center mb-6 uppercase">Malzeme Düzenle</h3>
        <div class="space-y-4">
            <input type="text" id="edAd" oninput="tipKontrol()" placeholder="Malzeme Adı (Örn: Tül veya Profil)" class="w-full border p-4 rounded-xl font-bold">
            <div class="grid grid-cols-2 gap-4">
                <select id="edSeri" class="border p-4 rounded-xl font-bold bg-white"></select>
                <input type="text" id="edRenk" placeholder="Renk" class="border p-4 rounded-xl font-bold">
            </div>
            <div class="grid grid-cols-2 gap-4 bg-blue-50 p-4 rounded-xl">
                <div>
                    <label class="text-[9px] font-black block mb-1">MİKTAR</label>
                    <input type="text" id="edMiktar" placeholder="0" class="w-full p-2 border rounded-lg font-bold">
                </div>
                <div>
                    <label class="text-[9px] font-black block mb-1">FİYAT (₺)</label>
                    <input type="text" id="edFiyat" placeholder="0.00" class="w-full p-2 border rounded-lg font-bold text-blue-600">
                </div>
            </div>
            <div class="flex gap-2 pt-4">
                <button onclick="editorKapat()" class="flex-1 font-bold text-slate-400">İPTAL</button>
                <button onclick="bulutKaydet()" class="flex-[2] bg-blue-600 text-white py-4 rounded-xl font-black">BULUTA KAYDET</button>
            </div>
        </div>
    </div>
</div>

<script>
    var maliyetListesi = [];
    var seriler = [];
    var tuller = [];
    var editId = null;
    const path = "adasineklik@54_com".replace(/\./g, '_');

    async function baslat() {
        // 1. Modelleri Çek (Dropdownlar için)
        const modelSnap = await window.db.doc(`Kullanicilar/${path}/Veriler/UrunModelleri`).get();
        if(modelSnap.exists()) {
            const data = modelSnap.data().liste || [];
            data.forEach(x => {
                if(x.ad === "Seri") seriler = x.ozellikler;
                if(x.ad === "Tül Cinsi") tuller = x.ozellikler;
            });
        }

        // 2. Malzemeleri Dinle (Real-time)
        window.db.doc(`Kullanicilar/${path}/Veriler/DepoMaliyetleri`).onSnapshot(doc => {
            if(doc.exists()) {
                maliyetListesi = JSON.parse(doc.data().json_data || "[]");
                listeyiYenile();
            }
        });
    }

    function listeyiYenile() {
        const ara = document.getElementById('mSearch').value.toLowerCase();
        const container = document.getElementById('listeContainer');
        const süzülmüş = maliyetListesi.filter(x => x.ad.toLowerCase().includes(ara) || x.seri.toLowerCase().includes(ara));

        container.innerHTML = süzülmüş.map(x => `
            <div class="bg-white border p-5 rounded-2xl flex justify-between items-center shadow-sm">
                <div>
                    <h4 class="font-black text-slate-800 text-sm uppercase">${x.ad}</h4>
                    <p class="text-[10px] font-bold text-blue-500">${x.seri} / ${x.renk}</p>
                    <div class="mt-2 text-[10px] font-black space-x-2">
                        <span class="text-slate-400 uppercase">Stok: ${x.adet || x.metre || 0}</span>
                        <span class="text-emerald-500 uppercase">Fiyat: ${x.adetFiyati || x.metreFiyati || 0} ₺</span>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="duzenle('${x.id}')" class="p-2 bg-slate-100 rounded-lg hover:bg-blue-600 hover:text-white transition">✏️</button>
                    <button onclick="sil('${x.id}')" class="p-2 bg-slate-100 rounded-lg hover:bg-red-600 hover:text-white transition">🗑️</button>
                </div>
            </div>
        `).join('');
    }

    function tipKontrol() {
        const ad = document.getElementById('edAd').value.toLowerCase();
        const sel = document.getElementById('edSeri');
        const liste = ad.includes("tül") ? tuller : seriler;
        sel.innerHTML = liste.map(x => `<option value="${x}">${x}</option>`).join('');
        document.getElementById('edRenk').style.display = ad.includes("tül") ? "none" : "block";
    }

    function yeniEkleAc() {
        editId = null;
        document.getElementById('edBaslik').innerText = "Yeni Malzeme";
        document.getElementById('edAd').value = "";
        tipKontrol();
        document.getElementById('editorDialog').classList.remove('hidden');
    }

    function duzenle(id) {
        const x = maliyetListesi.find(m => m.id === id);
        editId = id;
        document.getElementById('edAd').value = x.ad;
        tipKontrol();
        document.getElementById('edSeri').value = x.seri;
        document.getElementById('edRenk').value = x.renk;
        document.getElementById('edMiktar').value = x.adet || x.metre || "";
        document.getElementById('edFiyat').value = x.adetFiyati || x.metreFiyati || "";
        document.getElementById('editorDialog').classList.remove('hidden');
    }

    async function bulutKaydet() {
        const ad = document.getElementById('edAd').value;
        const yeni = {
            id: editId || Date.now().toString(),
            ad: ad,
            seri: document.getElementById('edSeri').value,
            renk: document.getElementById('edRenk').value || "Yok",
            adet: document.getElementById('edMiktar').value,
            adetFiyati: document.getElementById('edFiyat').value,
            olusturmaTarihi: Date.now()
        };

        let liste = [...maliyetListesi];
        if(editId) {
            const idx = liste.findIndex(m => m.id === editId);
            liste[idx] = yeni;
        } else {
            liste.push(yeni);
        }

        await window.db.doc(`Kullanicilar/${path}/Veriler/DepoMaliyetleri`).set({
            json_data: JSON.stringify(liste)
        });
        editorKapat();
    }

    async function sil(id) {
        if(!confirm("Silinsin mi?")) return;
        const yeni = maliyetListesi.filter(m => m.id !== id);
        await window.db.doc(`Kullanicilar/${path}/Veriler/DepoMaliyetleri`).set({ json_data: JSON.stringify(yeni) });
    }

    function editorKapat() { document.getElementById('editorDialog').classList.add('hidden'); }

    baslat();
</script>
