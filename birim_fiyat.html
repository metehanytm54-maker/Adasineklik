<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ada Sineklik - Birim Fiyat Yönetimi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 100; padding: 15px; }
        .modal.active { display: flex; }
        .modal-content { background: white; width: 100%; max-width: 600px; border-radius: 16px; max-height: 90vh; overflow-y: auto; }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <div class="flex justify-between items-center mb-8 bg-white p-5 rounded-xl border shadow-sm">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-black text-gray-800 uppercase">📦 Malzeme & Fiyat Yönetimi</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="modalAc()" class="bg-green-600 text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-green-700 transition">+ Yeni Malzeme Ekle</button>
                <a href="admin.html" class="bg-gray-100 text-gray-600 px-4 py-2 rounded-lg font-bold text-sm hover:bg-gray-200">Geri Dön</a>
            </div>
        </div>

        <div class="bg-white rounded-xl border shadow-sm overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-800 text-white text-[11px] uppercase tracking-wider">
                    <tr>
                        <th class="p-4">Malzeme Adı</th>
                        <th class="p-4">Seri/Cins</th>
                        <th class="p-4">Renk</th>
                        <th class="p-4">Birim Fiyatlar</th>
                        <th class="p-4 text-right">İşlem</th>
                    </tr>
                </thead>
                <tbody id="malzemeTablosu" class="divide-y text-sm">
                    <tr><td colspan="5" class="p-10 text-center text-gray-400 font-bold">Veriler Firebase'den yükleniyor...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="malzemeModal" class="modal">
        <div class="modal-content p-6 shadow-2xl">
            <div class="flex justify-between items-center border-b pb-4 mb-6">
                <h2 id="modalBaslik" class="text-xl font-black text-gray-800 uppercase">Yeni Malzeme Kaydı</h2>
                <button onclick="modalKapat()" class="text-3xl text-gray-400 hover:text-red-500 transition">&times;</button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div class="md:col-span-2">
                    <label class="text-[11px] font-bold text-gray-400 uppercase mb-1 block">Malzeme Adı</label>
                    <select id="spinnerAdi" onchange="formKontrol()" class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-blue-500 bg-gray-50 font-bold text-gray-700">
                        <option value="">Yükleniyor...</option>
                    </select>
                </div>

                <div>
                    <label id="lblSeri" class="text-[11px] font-bold text-gray-400 uppercase mb-1 block">Seri Seçimi</label>
                    <select id="spinnerSeri" class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-blue-500 bg-white font-medium">
                        <option value="Yok">--- Seri Seçin ---</option>
                    </select>
                </div>

                <div id="renkAlani">
                    <label class="text-[11px] font-bold text-gray-400 uppercase mb-1 block">Renk</label>
                    <select id="spinnerRenk" class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-blue-500 bg-white font-medium">
                        <option value="Yok">Yükleniyor...</option>
                    </select>
                </div>

                <div class="md:col-span-2 bg-gray-50 p-4 rounded-2xl border border-gray-100 mt-2">
                    <p class="text-[11px] font-black text-blue-600 mb-4 uppercase tracking-widest border-b pb-2">Birim Fiyatlar (₺)</p>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="etAdetFiyati" placeholder="Adet Fiyatı" class="w-full p-3 border border-gray-200 rounded-lg text-sm outline-none focus:border-blue-400">
                        <input type="number" id="etKiloFiyati" placeholder="Kilo Fiyatı" class="w-full p-3 border border-gray-200 rounded-lg text-sm outline-none focus:border-blue-400">
                        <input type="number" id="etMetreFiyati" placeholder="Metre Fiyatı" class="w-full p-3 border border-gray-200 rounded-lg text-sm outline-none focus:border-blue-400">
                        <input type="number" id="etMetreKareFiyati" placeholder="m² Fiyatı" class="w-full p-3 border border-gray-200 rounded-lg text-sm outline-none focus:border-blue-400">
                    </div>
                </div>
            </div>

            <button onclick="kaydet()" class="w-full mt-8 bg-blue-600 text-white py-4 rounded-2xl font-black text-lg hover:bg-blue-700 shadow-xl transition uppercase tracking-tighter active:scale-95">
                Veriyi Kaydet / Güncelle
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5cilsAyJrzPzwtgIBd1w7StfAkUBAO7E",
            authDomain: "adasineklik-f8c9f.firebaseapp.com",
            projectId: "adasineklik-f8c9f",
            storageBucket: "adasineklik-f8c9f.firebasestorage.app",
            messagingSenderId: "612764827500",
            appId: "1:612764827500:web:5b11b94229a36336547d49"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const userPath = "adasineklik@54_com".replace(/\./g, '_');

        let malzemeListesi = [];
        let anaMalzemeAdlari = [];
        let seriListesi = [];
        let tulListesi = [];
        let renkListesi = [];
        let duzenlenenId = null;

        async function verileriYukle() {
            try {
                const docNames = ["DepoMaliyetleri", "AnaMalzemeAdlari", "UrunModelleri"];
                const results = await Promise.all(docNames.map(name => getDoc(doc(doc(db, "Kullanicilar", userPath), "Veriler", name))));

                // 1. Malzeme Listesi
                if(results[0].exists()) {
                    const data = results[0].data().json_data;
                    malzemeListesi = typeof data === 'string' ? JSON.parse(data || "[]") : (data || []);
                }

                // 2. Malzeme İsimleri (Spinner 1)
                if(results[1].exists()) {
                    const data = results[1].data().json_data;
                    anaMalzemeAdlari = typeof data === 'string' ? JSON.parse(data || "[]") : (data || []);
                }

                // 3. Renk ve Seri (Spinner 2 ve 3)
                if(results[2].exists()){
                    const raw = results[2].data().liste || [];
                    raw.forEach(item => {
                        const ad = item.ad ? item.ad.trim() : "";
                        if(ad === "Seri") seriListesi = item.ozellikler || [];
                        if(ad === "Tül Cinsi") tulListesi = item.ozellikler || [];
                        if(ad === "Renk") renkListesi = item.ozellikler || [];
                    });
                }
                
                populateSelectors();
                renderTable();
                console.log("Bağlantı Başarılı. Renk Sayısı:", renkListesi.length);
            } catch (err) { 
                console.error("Firebase Hatası:", err);
                document.getElementById('malzemeTablosu').innerHTML = `<tr><td colspan="5" class="p-10 text-center text-red-500">Hata: ${err.message}</td></tr>`;
            }
        }

        function populateSelectors() {
            const sAdi = document.getElementById('spinnerAdi');
            const sRenk = document.getElementById('spinnerRenk');

            if(sAdi) {
                sAdi.innerHTML = `<option value="">--- Malzeme Seçiniz ---</option>` + 
                                 anaMalzemeAdlari.map(a => `<option value="${a}">${a}</option>`).join('');
            }

            if(sRenk) {
                sRenk.innerHTML = `<option value="Yok">Yok / Standart</option>` + 
                                  renkListesi.map(r => `<option value="${r}">${r}</option>`).join('');
            }
        }

        window.formKontrol = () => {
            const ad = document.getElementById('spinnerAdi').value;
            const renkAlani = document.getElementById('renkAlani');
            const lblSeri = document.getElementById('lblSeri');

            if(ad.toLowerCase().includes("tül")) {
                lblSeri.innerText = "TÜL CİNSİ SEÇİMİ";
                renkAlani.style.visibility = 'hidden'; // Tasarım kaymasın diye gizle
                populateSeri(tulListesi, "--- Tül Seçin ---");
            } else {
                lblSeri.innerText = "SERİ SEÇİMİ";
                renkAlani.style.visibility = 'visible';
                populateSeri(seriListesi, "--- Seri Seçin ---");
            }
        }

        function populateSeri(liste, baslik) {
            const spinner = document.getElementById('spinnerSeri');
            spinner.innerHTML = `<option value="Yok">${baslik}</option>` + 
                                liste.map(s => `<option value="${s}">${s}</option>`).join('');
        }

        function renderTable() {
            const container = document.getElementById('malzemeTablosu');
            if(malzemeListesi.length === 0) {
                container.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-gray-400">Kayıtlı veri bulunamadı.</td></tr>`;
                return;
            }
            container.innerHTML = malzemeListesi.map((m, index) => `
                <tr class="hover:bg-gray-50 transition border-b">
                    <td class="p-4 font-bold text-gray-800">${m.ad}</td>
                    <td class="p-4"><span class="bg-blue-50 text-blue-700 px-2 py-1 rounded text-[10px] font-black uppercase">${m.seri}</span></td>
                    <td class="p-4 text-gray-500 font-medium">${m.renk}</td>
                    <td class="p-4">
                        <div class="text-[10px] grid grid-cols-2 gap-x-2">
                            ${m.adetFiyati ? `<span>Adet: <b>${m.adetFiyati}₺</b></span>` : ''}
                            ${m.kiloFiyati ? `<span>Kilo: <b>${m.kiloFiyati}₺</b></span>` : ''}
                            ${m.metreFiyati ? `<span>Metre: <b>${m.metreFiyati}₺</b></span>` : ''}
                            ${m.metrekareFiyati ? `<span>m²: <b>${m.metrekareFiyati}₺</b></span>` : ''}
                        </div>
                    </td>
                    <td class="p-4 text-right">
                        <button onclick="duzenle(${index})" class="text-blue-600 font-bold mr-3 hover:text-blue-800">DÜZENLE</button>
                        <button onclick="sil(${index})" class="text-red-500 font-bold hover:text-red-700">SİL</button>
                    </td>
                </tr>
            `).join('');
        }

        window.kaydet = async () => {
            const ad = document.getElementById('spinnerAdi').value;
            if(!ad) return alert("Lütfen malzeme seçin!");

            const yeniMalzeme = {
                id: duzenlenenId || crypto.randomUUID(),
                ad: ad,
                seri: document.getElementById('spinnerSeri').value,
                renk: document.getElementById('spinnerRenk').value,
                adetFiyati: document.getElementById('etAdetFiyati').value,
                kiloFiyati: document.getElementById('etKiloFiyati').value,
                metreFiyati: document.getElementById('etMetreFiyati').value,
                metrekareFiyati: document.getElementById('etMetreKareFiyati').value,
                olusturmaTarihi: Date.now()
            };

            const index = malzemeListesi.findIndex(m => m.id === yeniMalzeme.id);
            if(index !== -1) malzemeListesi[index] = yeniMalzeme;
            else malzemeListesi.unshift(yeniMalzeme);

            try {
                await setDoc(doc(db, "Kullanicilar", userPath, "Veriler", "DepoMaliyetleri"), { json_data: JSON.stringify(malzemeListesi) });
                modalKapat();
                verileriYukle();
            } catch (e) { alert("Kaydetme Hatası: " + e.message); }
        }

        window.sil = async (index) => {
            if(!confirm("Bu malzemeyi silmek istediğinize emin misiniz?")) return;
            malzemeListesi.splice(index, 1);
            await setDoc(doc(db, "Kullanicilar", userPath, "Veriler", "DepoMaliyetleri"), { json_data: JSON.stringify(malzemeListesi) });
            verileriYukle();
        }

        window.modalAc = () => {
            duzenlenenId = null;
            document.getElementById('modalBaslik').innerText = "Yeni Malzeme Kaydı";
            document.getElementById('spinnerAdi').value = "";
            document.getElementById('spinnerRenk').value = "Yok";
            document.querySelectorAll('input[type="number"]').forEach(i => i.value = "");
            formKontrol();
            document.getElementById('malzemeModal').classList.add('active');
        }

        window.duzenle = (index) => {
            const m = malzemeListesi[index];
            duzenlenenId = m.id;
            document.getElementById('modalBaslik').innerText = "Malzeme Düzenle";
            document.getElementById('spinnerAdi').value = m.ad;
            formKontrol();
            document.getElementById('spinnerSeri').value = m.seri;
            document.getElementById('spinnerRenk').value = m.renk || "Yok";
            document.getElementById('etAdetFiyati').value = m.adetFiyati;
            document.getElementById('etKiloFiyati').value = m.kiloFiyati;
            document.getElementById('etMetreFiyati').value = m.metreFiyati;
            document.getElementById('etMetreKareFiyati').value = m.metrekareFiyati;
            document.getElementById('malzemeModal').classList.add('active');
        }

        window.modalKapat = () => document.getElementById('malzemeModal').classList.remove('active');

        verileriYukle();
    </script>
</body>
</html>
