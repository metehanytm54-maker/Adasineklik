<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ada Sineklik - Birim Fiyat Yönetimi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 100; padding: 15px; }
        .modal.active { display: flex; }
        .modal-content { background: white; width: 100%; max-width: 600px; border-radius: 16px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <div class="flex justify-between items-center mb-8 bg-white p-5 rounded-xl border shadow-sm">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-black text-gray-800 uppercase">📦 Malzeme & Fiyat Yönetimi</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="modalAc()" class="bg-green-600 text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-green-700">+ Yeni Malzeme Ekle</button>
                <a href="admin.html" class="bg-gray-100 text-gray-600 px-4 py-2 rounded-lg font-bold text-sm">Geri Dön</a>
            </div>
        </div>

        <div class="bg-white rounded-xl border shadow-sm overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-800 text-white text-xs uppercase">
                    <tr>
                        <th class="p-4">Malzeme Adı</th>
                        <th class="p-4">Seri/Cins</th>
                        <th class="p-4">Renk</th>
                        <th class="p-4">Birim Fiyatlar</th>
                        <th class="p-4 text-right">İşlem</th>
                    </tr>
                </thead>
                <tbody id="malzemeTablosu" class="divide-y">
                    <tr><td colspan="5" class="p-10 text-center text-gray-400">Veriler yükleniyor...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="malzemeModal" class="modal">
        <div class="modal-content p-6 shadow-2xl">
            <div class="flex justify-between items-center border-b pb-4 mb-4">
                <h2 id="modalBaslik" class="text-lg font-bold uppercase text-gray-700">Yeni Malzeme Kaydı</h2>
                <button onclick="modalKapat()" class="text-2xl text-gray-400 hover:text-red-500">&times;</button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-2">
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Malzeme Adı</label>
                    <select id="spinnerAdi" onchange="formKontrol()" class="w-full border p-2.5 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50 font-bold text-gray-700"></select>
                </div>

                <div>
                    <label id="lblSeri" class="text-[10px] font-bold text-gray-400 uppercase">Seri Seçimi</label>
                    <select id="spinnerSeri" class="w-full border p-2.5 rounded-lg outline-none bg-white"></select>
                </div>

                <div id="renkAlani">
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Renk</label>
                    <select id="spinnerRenk" class="w-full border p-2.5 rounded-lg outline-none bg-white"></select>
                </div>

                <div class="p-3 bg-blue-50/50 rounded-lg border border-blue-100">
                    <p class="text-[10px] font-bold text-blue-600 mb-2 border-b border-blue-200">ADET BAZLI</p>
                    <input type="number" id="etAdetFiyati" placeholder="0.00 ₺" class="w-full text-sm p-2 border rounded outline-none focus:border-blue-400">
                </div>
                <div class="p-3 bg-blue-50/50 rounded-lg border border-blue-100">
                    <p class="text-[10px] font-bold text-blue-600 mb-2 border-b border-blue-200">KİLO BAZLI</p>
                    <input type="number" id="etKiloFiyati" placeholder="0.00 ₺" class="w-full text-sm p-2 border rounded outline-none focus:border-blue-400">
                </div>
                <div class="p-3 bg-blue-50/50 rounded-lg border border-blue-100">
                    <p class="text-[10px] font-bold text-blue-600 mb-2 border-b border-blue-200">METRE BAZLI</p>
                    <input type="number" id="etMetreFiyati" placeholder="0.00 ₺" class="w-full text-sm p-2 border rounded outline-none focus:border-blue-400">
                </div>
                <div class="p-3 bg-blue-50/50 rounded-lg border border-blue-100">
                    <p class="text-[10px] font-bold text-blue-600 mb-2 border-b border-blue-200">m² BAZLI</p>
                    <input type="number" id="etMetreKareFiyati" placeholder="0.00 ₺" class="w-full text-sm p-2 border rounded outline-none focus:border-blue-400">
                </div>
            </div>

            <button onclick="kaydet()" class="w-full mt-6 bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg transition uppercase tracking-wide">Kaydet / Bilgileri Güncelle</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5cilsAyJrzPzwtgIBd1w7StfAkUBAO7E",
            authDomain: "adasineklik-f8c9f.firebaseapp.com",
            projectId: "adasineklik-f8c9f",
            storageBucket: "adasineklik-f8c9f.firebasestorage.app",
            messagingSenderId: "612764827500",
            appId: "1:612764827500:web:5b11b94229a36336547d49"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const userPath = "adasineklik@54_com".replace(/\./g, '_');

        let malzemeListesi = [];
        let anaMalzemeAdlari = [];
        let seriListesi = [];
        let tulListesi = [];
        let renkListesi = []; // Yeni eklendi
        let duzenlenenId = null;

        async function verileriYukle() {
            try {
                const docNames = ["DepoMaliyetleri", "AnaMalzemeAdlari", "UrunModelleri"];
                const results = await Promise.all(docNames.map(name => getDoc(doc(db, "Kullanicilar", userPath, "Veriler", name))));

                if(results[0].exists()) malzemeListesi = JSON.parse(results[0].data().json_data || "[]");
                if(results[1].exists()) anaMalzemeAdlari = JSON.parse(results[1].data().json_data || "[]");

                if(results[2].exists()){
                    const raw = results[2].data().liste || [];
                    raw.forEach(item => {
                        if(item.ad === "Seri") seriListesi = item.ozellikler || [];
                        if(item.ad === "Tül Cinsi") tulListesi = item.ozellikler || [];
                        if(item.ad === "Renk") renkListesi = item.ozellikler || []; // urun_ayar'dan çekilen renkler
                    });
                }
                
                setupSelectors();
                renderTable();
            } catch (err) { console.error("Hata:", err); }
        }

        // Açılır listeleri başlat
        function setupSelectors() {
            fillSelect("spinnerAdi", anaMalzemeAdlari, "Malzeme");
            fillSelect("spinnerRenk", renkListesi, "Renk");
        }

        function fillSelect(id, list, hint) {
            const el = document.getElementById(id);
            el.innerHTML = `<option value="">--- ${hint} Seçiniz ---</option>` + 
                           list.map(i => `<option value="${i}">${i}</option>`).join('');
        }

        window.formKontrol = () => {
            const secilenAd = document.getElementById('spinnerAdi').value;
            const renkAlani = document.getElementById('renkAlani');
            const lblSeri = document.getElementById('lblSeri');

            if(secilenAd.toLowerCase().includes("tül")) {
                lblSeri.innerText = "TÜL CİNSİ SEÇİMİ";
                renkAlani.style.display = 'none';
                populateSeri(tulListesi, "--- Tül Seçin ---");
            } else {
                lblSeri.innerText = "SERİ SEÇİMİ";
                renkAlani.style.display = 'block';
                populateSeri(seriListesi, "--- Seri Seçin ---");
            }
        }

        function populateSeri(liste, baslik) {
            const spinner = document.getElementById('spinnerSeri');
            spinner.innerHTML = `<option value="Yok">${baslik}</option>` + 
                                liste.map(s => `<option value="${s}">${s}</option>`).join('');
        }

        function renderTable() {
            const container = document.getElementById('malzemeTablosu');
            if(malzemeListesi.length === 0) {
                container.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-gray-400">Kayıtlı malzeme bulunamadı.</td></tr>`;
                return;
            }
            container.innerHTML = malzemeListesi.map((m, index) => `
                <tr class="hover:bg-gray-50 transition text-sm">
                    <td class="p-4 font-bold text-gray-800">${m.ad}</td>
                    <td class="p-4"><span class="bg-blue-50 text-blue-700 px-2 py-1 rounded text-xs font-bold uppercase">${m.seri}</span></td>
                    <td class="p-4 text-gray-500 font-medium">${m.renk}</td>
                    <td class="p-4">
                        <div class="text-[11px] grid grid-cols-2 gap-x-4 gap-y-1">
                            ${m.adetFiyati ? `<span class="text-gray-400">Adet: <b class="text-gray-700">${m.adetFiyati}₺</b></span>` : ''}
                            ${m.kiloFiyati ? `<span class="text-gray-400">Kilo: <b class="text-gray-700">${m.kiloFiyati}₺</b></span>` : ''}
                            ${m.metreFiyati ? `<span class="text-gray-400">Metre: <b class="text-gray-700">${m.metreFiyati}₺</b></span>` : ''}
                            ${m.metrekareFiyati ? `<span class="text-gray-400">m²: <b class="text-gray-700">${m.metrekareFiyati}₺</b></span>` : ''}
                        </div>
                    </td>
                    <td class="p-4 text-right">
                        <button onclick="duzenle(${index})" class="bg-blue-50 text-blue-600 px-3 py-1 rounded-md font-bold text-xs hover:bg-blue-600 hover:text-white transition">DÜZENLE</button>
                        <button onclick="sil(${index})" class="bg-red-50 text-red-600 px-3 py-1 rounded-md font-bold text-xs hover:bg-red-600 hover:text-white transition ml-1">SİL</button>
                    </td>
                </tr>
            `).join('');
        }

        window.kaydet = async () => {
            const ad = document.getElementById('spinnerAdi').value;
            if(!ad) return alert("Lütfen malzeme seçin!");

            const yeniMalzeme = {
                id: duzenlenenId || crypto.randomUUID(),
                ad: ad,
                seri: document.getElementById('spinnerSeri').value,
                renk: document.getElementById('spinnerRenk').value || "Yok",
                adetFiyati: document.getElementById('etAdetFiyati').value,
                kiloFiyati: document.getElementById('etKiloFiyati').value,
                metreFiyati: document.getElementById('etMetreFiyati').value,
                metrekareFiyati: document.getElementById('etMetreKareFiyati').value,
                olusturmaTarihi: Date.now()
            };

            const index = malzemeListesi.findIndex(m => m.id === yeniMalzeme.id);
            if(index !== -1) malzemeListesi[index] = yeniMalzeme;
            else malzemeListesi.unshift(yeniMalzeme);

            await setDoc(doc(db, "Kullanicilar", userPath, "Veriler", "DepoMaliyetleri"), { json_data: JSON.stringify(malzemeListesi) });
            
            modalKapat();
            verileriYukle();
        }

        window.sil = async (index) => {
            if(!confirm("Bu malzemeyi silmek istediğinize emin misiniz?")) return;
            malzemeListesi.splice(index, 1);
            await setDoc(doc(db, "Kullanicilar", userPath, "Veriler", "DepoMaliyetleri"), { json_data: JSON.stringify(malzemeListesi) });
            verileriYukle();
        }

        window.modalAc = () => {
            duzenlenenId = null;
            document.getElementById('modalBaslik').innerText = "Yeni Malzeme Kaydı";
            document.getElementById('spinnerAdi').value = "";
            document.getElementById('spinnerRenk').value = "";
            document.querySelectorAll('input[type="number"]').forEach(i => i.value = "");
            formKontrol();
            document.getElementById('malzemeModal').classList.add('active');
        }

        window.duzenle = (index) => {
            const m = malzemeListesi[index];
            duzenlenenId = m.id;
            document.getElementById('modalBaslik').innerText = "Malzeme Düzenle";
            
            document.getElementById('spinnerAdi').value = m.ad;
            formKontrol(); // Seri/Tül spinner'ını tetikle
            
            document.getElementById('spinnerSeri').value = m.seri;
            document.getElementById('spinnerRenk').value = m.renk;
            document.getElementById('etAdetFiyati').value = m.adetFiyati;
            document.getElementById('etKiloFiyati').value = m.kiloFiyati;
            document.getElementById('etMetreFiyati').value = m.metreFiyati;
            document.getElementById('etMetreKareFiyati').value = m.metrekareFiyati;
            document.getElementById('malzemeModal').classList.add('active');
        }

        window.modalKapat = () => document.getElementById('malzemeModal').classList.remove('active');

        verileriYukle();
    </script>
</body>
</html>
