<div class="flex flex-col gap-6">
    <div class="flex justify-between items-center bg-blue-600 p-6 rounded-[24px] text-white shadow-lg shadow-blue-100">
        <div>
            <h3 class="text-xl font-black uppercase tracking-tighter">Birim Fiyat & Stok</h3>
            <p class="text-[10px] opacity-80 font-bold">TOPLAM ÜRÜN: <span id="stokSayisi">0</span></p>
        </div>
        <button onclick="yeniMalzemeAc()" class="bg-white text-blue-600 px-6 py-3 rounded-xl font-black text-xs hover:bg-blue-50 transition-all">+ YENİ EKLE</button>
    </div>

    <input type="text" id="araBox" oninput="listeyiFiltrele()" placeholder="Malzeme adı veya seri ile ara..." class="w-full p-5 rounded-2xl border-2 border-slate-100 outline-none focus:border-blue-400 transition-all bg-white font-medium">

    <div id="malzemeListesi" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        </div>
</div>

<div id="miniDialog" class="hidden fixed inset-0 z-[1200] bg-slate-900/90 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-lg rounded-[32px] p-8 shadow-2xl">
        <h4 id="dBaslik" class="font-black text-slate-800 uppercase mb-6 text-center">Malzeme Kaydı</h4>
        
        <div class="space-y-4">
            <input type="text" id="mAd" oninput="adDegisti()" placeholder="Malzeme Adı (Örn: Tül)" class="w-full p-4 rounded-xl border-2 border-slate-100 outline-none focus:border-blue-500 font-bold">
            
            <div class="grid grid-cols-2 gap-4">
                <select id="mSeri" class="p-4 rounded-xl border-2 border-slate-100 outline-none font-bold bg-white text-sm"></select>
                <input type="text" id="mRenk" placeholder="Renk" class="p-4 rounded-xl border-2 border-slate-100 outline-none font-bold text-sm">
            </div>

            <div class="grid grid-cols-2 gap-2 bg-slate-50 p-4 rounded-2xl border">
                <div class="space-y-2">
                    <label class="text-[9px] font-black text-slate-400 ml-1">STOK MİKTARI</label>
                    <input type="text" id="mStok" placeholder="0" class="w-full p-3 rounded-lg border outline-none font-bold">
                </div>
                <div class="space-y-2">
                    <label class="text-[9px] font-black text-slate-400 ml-1">BİRİM FİYAT (₺)</label>
                    <input type="text" id="mFiyat" placeholder="0.00" class="w-full p-3 rounded-lg border outline-none font-bold text-blue-600">
                </div>
            </div>

            <div class="flex gap-3 pt-4">
                <button onclick="miniDialogKapat()" class="flex-1 py-4 font-bold text-slate-400 hover:text-slate-600 transition">İPTAL</button>
                <button onclick="veriyiKaydet()" class="flex-[2] bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-blue-100 uppercase text-sm">Kaydet</button>
            </div>
        </div>
    </div>
</div>

<script>
    var tumMalzemeler = [];
    var seriListesi = [];
    var tulListesi = [];
    var duzenlenenId = null;
    const userPath = "adasineklik@54_com".replace(/\./g, '_');

    window.birimFiyatBaslat = async () => {
        // 1. Seri ve Tül Listelerini Getir
        const modelSnap = await window.db.doc(`Kullanicilar/${userPath}/Veriler/UrunModelleri`).get();
        if(modelSnap.exists()){
            const data = modelSnap.data().liste || [];
            data.forEach(item => {
                if(item.ad === "Seri") seriListesi = item.ozellikler;
                if(item.ad === "Tül Cinsi") tulListesi = item.ozellikler;
            });
        }

        // 2. Malzemeleri Dinle (Kotlin'deki bulutVerileriniYukle)
        window.onSnapshot(window.doc(window.db, "Kullanicilar", userPath, "Veriler", "DepoMaliyetleri"), (doc) => {
            if(doc.exists()){
                tumMalzemeler = JSON.parse(doc.data().json_data || "[]");
                ekranaBas();
            }
        });
    };

    function ekranaBas(filtre = "") {
        const container = document.getElementById('malzemeListesi');
        const liste = tumMalzemeler.filter(m => m.ad.toLowerCase().includes(filtre.toLowerCase()) || m.seri.toLowerCase().includes(filtre.toLowerCase()));
        document.getElementById('stokSayisi').innerText = liste.length;

        container.innerHTML = liste.map(m => `
            <div class="bg-white p-5 rounded-2xl border-2 border-slate-50 shadow-sm flex justify-between items-center group hover:border-blue-100 transition-all">
                <div>
                    <h4 class="font-black text-slate-800 text-sm uppercase">${m.ad}</h4>
                    <p class="text-[10px] font-bold text-slate-400 uppercase">${m.seri} / ${m.renk}</p>
                    <div class="mt-3 flex gap-2">
                        <span class="bg-blue-50 text-blue-600 text-[9px] font-black px-2 py-1 rounded">STOK: ${m.adet || m.metre || 0}</span>
                        <span class="bg-emerald-50 text-emerald-600 text-[9px] font-black px-2 py-1 rounded">FİYAT: ${m.adetFiyati || m.metreFiyati || 0} ₺</span>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="duzenleModu('${m.id}')" class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-50 text-slate-400 hover:bg-blue-600 hover:text-white transition-all text-xs">✏️</button>
                    <button onclick="sil('${m.id}')" class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-50 text-red-300 hover:bg-red-600 hover:text-white transition-all text-xs">🗑️</button>
                </div>
            </div>
        `).join('');
    }

    function adDegisti() {
        const ad = document.getElementById('mAd').value.toLowerCase();
        const select = document.getElementById('mSeri');
        const liste = ad.includes("tül") ? tulListesi : seriListesi;
        
        select.innerHTML = '<option value="Yok">--- Seçiniz ---</option>' + 
            liste.map(s => `<option value="${s}">${s}</option>`).join('');
        
        document.getElementById('mRenk').style.display = ad.includes("tül") ? "none" : "block";
    }

    function yeniMalzemeAc() {
        duzenlenenId = null;
        document.getElementById('mAd').value = "";
        adDegisti();
        document.getElementById('miniDialog').classList.remove('hidden');
    }

    function duzenleModu(id) {
        const m = tumMalzemeler.find(x => x.id === id);
        if(!m) return;
        duzenlenenId = id;
        document.getElementById('mAd').value = m.ad;
        adDegisti();
        document.getElementById('mSeri').value = m.seri;
        document.getElementById('mRenk').value = m.renk;
        document.getElementById('mStok').value = m.adet || m.metre || "";
        document.getElementById('mFiyat').value = m.adetFiyati || m.metreFiyati || "";
        document.getElementById('miniDialog').classList.remove('hidden');
    }

    async function veriyiKaydet() {
        const ad = document.getElementById('mAd').value;
        if(!ad) return;

        const yeni = {
            id: duzenlenenId || Date.now().toString(),
            ad: ad,
            seri: document.getElementById('mSeri').value,
            renk: document.getElementById('mRenk').value || "Yok",
            adet: document.getElementById('mStok').value,
            adetFiyati: document.getElementById('mFiyat').value,
            olusturmaTarihi: Date.now()
        };

        let liste = [...tumMalzemeler];
        if(duzenlenenId) {
            const idx = liste.findIndex(x => x.id === duzenlenenId);
            liste[idx] = yeni;
        } else {
            liste.push(yeni);
        }

        await window.setDoc(window.doc(window.db, "Kullanicilar", userPath, "Veriler", "DepoMaliyetleri"), {
            json_data: JSON.stringify(liste)
        });

        miniDialogKapat();
    }

    async function sil(id) {
        if(!confirm("Silinsin mi?")) return;
        const yeniListe = tumMalzemeler.filter(x => x.id !== id);
        await window.setDoc(window.doc(window.db, "Kullanicilar", userPath, "Veriler", "DepoMaliyetleri"), {
            json_data: JSON.stringify(yeniListe)
        });
    }

    function miniDialogKapat() { document.getElementById('miniDialog').classList.add('hidden'); }
    function listeyiFiltrele() { ekranaBas(document.getElementById('araBox').value); }
    
    // Sayfa içinden başlatma
    birimFiyatBaslat();
</script>
