<div class="flex flex-col gap-6">
    <div class="flex justify-between items-center bg-blue-50 p-4 rounded-xl border border-blue-100">
        <div>
            <h3 class="text-lg font-black text-blue-800 uppercase tracking-tight">Birim Fiyat & Stok Yönetimi</h3>
            <p class="text-xs text-blue-600">Malzeme maliyetlerini ve depo adetlerini buradan güncelleyebilirsiniz.</p>
        </div>
        <button onclick="malzemeDialogAc()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg transition-all active:scale-95">
            + Yeni Malzeme Ekle
        </button>
    </div>

    <div class="relative">
        <input type="text" id="malzemeAra" onkeyup="malzemeFiltrele()" placeholder="Malzeme adı veya seri ara..." 
               class="w-full p-4 pl-12 rounded-2xl border-2 border-slate-100 outline-none focus:border-blue-400 transition-all">
        <span class="absolute left-4 top-4 opacity-30">🔍</span>
    </div>

    <div id="malzemeListesiContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        </div>
</div>

<div id="malzemeDialog" class="hidden fixed inset-0 z-[1100] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-2xl rounded-[32px] shadow-2xl overflow-hidden max-h-[90vh] overflow-y-auto">
        <div class="p-6 border-b flex justify-between items-center bg-slate-50">
            <h4 id="dialogBaslik" class="font-black text-slate-800 uppercase">Malzeme Kaydı</h4>
            <button onclick="malzemeDialogKapat()" class="text-2xl opacity-30 hover:opacity-100">&times;</button>
        </div>
        
        <div class="p-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="col-span-1 md:col-span-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Malzeme Adı (Örn: Alüminyum Profil veya Tül)</label>
                    <input type="text" id="etMalzemeAdi" onblur="adKontrol()" class="w-full border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-blue-500">
                </div>
                <div>
                    <label id="spinnerEtiket" class="text-[10px] font-bold text-slate-400 uppercase ml-2">Seri / Seçenek</label>
                    <select id="spinnerSeri" class="w-full border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-blue-500 bg-white">
                        <option value="Yok">--- Seçiniz ---</option>
                    </select>
                </div>
                <div id="renkAlani">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Renk</label>
                    <input type="text" id="etRenk" class="w-full border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-blue-500">
                </div>
            </div>

            <hr class="border-slate-100">

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
                <div class="bg-orange-50 p-3 rounded-2xl border border-orange-100">
                    <span class="text-[9px] font-black text-orange-400 uppercase">Adet</span>
                    <input type="text" id="etAdet" placeholder="Miktar" class="w-full bg-transparent text-center font-bold outline-none">
                    <input type="text" id="etAdetFiyati" placeholder="Fiyat ₺" class="w-full bg-transparent text-center text-xs outline-none border-t border-orange-200 mt-1 pt-1">
                </div>
                <div class="bg-blue-50 p-3 rounded-2xl border border-blue-100">
                    <span class="text-[9px] font-black text-blue-400 uppercase">Kilo</span>
                    <input type="text" id="etKilo" placeholder="KG" class="w-full bg-transparent text-center font-bold outline-none">
                    <input type="text" id="etKiloFiyati" placeholder="Fiyat ₺" class="w-full bg-transparent text-center text-xs outline-none border-t border-blue-200 mt-1 pt-1">
                </div>
                <div class="bg-emerald-50 p-3 rounded-2xl border border-emerald-100">
                    <span class="text-[9px] font-black text-emerald-400 uppercase">Metre</span>
                    <input type="text" id="etMetre" placeholder="MT" class="w-full bg-transparent text-center font-bold outline-none">
                    <input type="text" id="etMetreFiyati" placeholder="Fiyat ₺" class="w-full bg-transparent text-center text-xs outline-none border-t border-emerald-200 mt-1 pt-1">
                </div>
                <div class="bg-purple-50 p-3 rounded-2xl border border-purple-100">
                    <span class="text-[9px] font-black text-purple-400 uppercase">M2</span>
                    <input type="text" id="etMetreKare" placeholder="M2" class="w-full bg-transparent text-center font-bold outline-none">
                    <input type="text" id="etMetreKareFiyati" placeholder="Fiyat ₺" class="w-full bg-transparent text-center text-xs outline-none border-t border-purple-200 mt-1 pt-1">
                </div>
            </div>

            <button onclick="malzemeKaydet()" id="btnKaydet" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black hover:bg-black transition-all shadow-xl">KAYDET</button>
        </div>
    </div>
</div>

<script>
    // --- GLOBAL DEĞİŞKENLER (Kotlin'deki private lateinit var karşılığı) ---
    var depoMaliyetleri = [];
    var seriListesi = [];
    var tulListesi = [];
    var duzenlenenId = null;

    // --- VERİLERİ YÜKLE ---
    async function birimFiyatBaslat() {
        const userPath = "adasineklik@54_com".replace(/\./g, '_');
        
        // 1. Ürün Modellerini Çek (Seri ve Tül listesi için)
        const modelSnap = await db.collection("Kullanicilar").document(userPath).collection("Veriler").document("UrunModelleri").get();
        if(modelSnap.exists()) {
            const data = modelSnap.data().liste || [];
            data.forEach(item => {
                if(item.ad === "Seri") seriListesi = item.ozellikler || [];
                if(item.ad === "Tül Cinsi") tulListesi = item.ozellikler || [];
            });
        }

        // 2. Depo Maliyetlerini Çek
        const depoSnap = await db.collection("Kullanicilar").document(userPath).collection("Veriler").document("DepoMaliyetleri").get();
        if(depoSnap.exists()) {
            depoMaliyetleri = JSON.parse(depoSnap.data().json_data || "[]");
            malzemeListele();
        }
    }

    // --- LİSTELEME (RecyclerView notifyDataSetChanged karşılığı) ---
    function malzemeListele() {
        const container = document.getElementById('malzemeListesiContainer');
        container.innerHTML = depoMaliyetleri.map((m, index) => `
            <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex justify-between items-center hover:shadow-md transition-all">
                <div class="flex-1">
                    <div class="flex items-center gap-2 mb-1">
                        <span class="w-2 h-2 bg-blue-500 rounded-full"></span>
                        <h5 class="font-black text-slate-800 uppercase text-sm">${m.ad}</h5>
                    </div>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">${m.seri} / ${m.renk}</p>
                    <div class="flex gap-2 mt-3 text-[10px] font-bold">
                        ${m.adet > 0 ? `<span class="bg-orange-50 text-orange-600 px-2 py-1 rounded-md">STOK: ${m.adet} Adet</span>` : ''}
                        ${m.metre > 0 ? `<span class="bg-emerald-50 text-emerald-600 px-2 py-1 rounded-md">STOK: ${m.metre} Mt</span>` : ''}
                    </div>
                </div>
                <div class="flex flex-col gap-2">
                    <button onclick="malzemeDuzenle('${m.id}')" class="p-2 bg-slate-50 text-slate-600 rounded-xl hover:bg-blue-50 hover:text-blue-600 transition-all text-xs">✏️</button>
                    <button onclick="malzemeSil('${m.id}')" class="p-2 bg-slate-50 text-red-100 rounded-xl hover:bg-red-50 hover:text-red-600 transition-all text-xs">🗑️</button>
                </div>
            </div>
        `).join('');
    }

    // --- DİNAMİK AD KONTROLÜ (Kotlin'deki onFocusChangeListener karşılığı) ---
    function adKontrol() {
        const ad = document.getElementById('etMalzemeAdi').value;
        const spinner = document.getElementById('spinnerSeri');
        const renkAlani = document.getElementById('renkAlani');
        const etiket = document.getElementById('spinnerEtiket');

        let data = [];
        if (ad.toLowerCase().includes("tül")) {
            data = tulListesi;
            etiket.innerText = "Tül Cinsi";
            renkAlani.classList.add('hidden');
        } else {
            data = seriListesi;
            etiket.innerText = "Seri Seçimi";
            renkAlani.classList.remove('hidden');
        }

        spinner.innerHTML = `<option value="Yok">--- Seçiniz ---</option>` + 
            data.map(i => `<option value="${i}">${i}</option>`).join('');
    }

    // --- DIALOG İŞLEMLERİ ---
    function malzemeDialogAc() {
        duzenlenenId = null;
        document.getElementById('malzemeDialog').classList.remove('hidden');
        document.getElementById('btnKaydet').innerText = "KAYDET";
        document.getElementById('dialogBaslik').innerText = "Yeni Malzeme Kaydı";
        // Formu temizle...
    }

    function malzemeDialogKapat() {
        document.getElementById('malzemeDialog').classList.add('hidden');
    }

    async function malzemeKaydet() {
        const ad = document.getElementById('etMalzemeAdi').value;
        if(!ad) return alert("Ad gerekli!");

        const yeni = {
            id: duzenlenenId || Date.now().toString(),
            ad: ad,
            seri: document.getElementById('spinnerSeri').value,
            renk: document.getElementById('etRenk').value || "Yok",
            adet: document.getElementById('etAdet').value,
            adetFiyati: document.getElementById('etAdetFiyati').value,
            kilo: document.getElementById('etKilo').value,
            kiloFiyati: document.getElementById('etKiloFiyati').value,
            metre: document.getElementById('etMetre').value,
            metreFiyati: document.getElementById('etMetreFiyati').value,
            metrekare: document.getElementById('etMetreKare').value,
            metrekareFiyati: document.getElementById('etMetreKareFiyati').value,
            olusturmaTarihi: Date.now()
        };

        if(duzenlenenId) {
            const index = depoMaliyetleri.findIndex(i => i.id === duzenlenenId);
            depoMaliyetleri[index] = yeni;
        } else {
            depoMaliyetleri.push(yeni);
        }

        // Firebase Kaydet
        const userPath = "adasineklik@54_com".replace(/\./g, '_');
        await db.collection("Kullanicilar").document(userPath).collection("Veriler").document("DepoMaliyetleri").set({
            json_data: JSON.stringify(depoMaliyetleri)
        });

        malzemeDialogKapat();
        malzemeListele();
    }

    function malzemeDuzenle(id) {
        const m = depoMaliyetleri.find(i => i.id === id);
        if(!m) return;

        duzenlenenId = id;
        document.getElementById('dialogBaslik').innerText = "KAYDI GÜNCELLE";
        document.getElementById('btnKaydet').innerText = "GÜNCELLEMELERİ KAYDET";
        
        document.getElementById('etMalzemeAdi').value = m.ad;
        adKontrol(); // Spinner'ı tetikle
        document.getElementById('spinnerSeri').value = m.seri;
        document.getElementById('etRenk').value = m.renk;
        document.getElementById('etAdet').value = m.adet;
        // ... diğer fiyat alanlarını da setle ...
        
        document.getElementById('malzemeDialog').classList.remove('hidden');
    }

    // Başlat
    birimFiyatBaslat();

</script>
