<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ada Sineklik - Müşteri Girişi</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #1b5e20; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 14px; background: #2e7d32; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 15px; transition: 0.3s; }
        button:hover { background: #1b5e20; }
        .links { text-align: center; margin-top: 15px; font-size: 14px; }
        .links a { color: #2e7d32; text-decoration: none; }
        .footer { text-align: center; font-size: 12px; color: #888; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Müşteri Girişi</h2>
    <input type="text" id="loginAdSoyad" placeholder="Ad Soyad">
    <input type="password" id="loginSifre" placeholder="Şifre">
    <button id="btnGiris">Giriş Yap</button>
    
    <div class="links">
        Hesabınız yok mu? <a href="kayit.html">Kayıt Olun</a>
    </div>
    <div class="footer">© 2025 Ada Sineklik Sistemi</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.18.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.18.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD5cilsAyJrzPzwtgIBd1w7StfAkUBAO7E",
        authDomain: "adasineklik-f8c9f.firebaseapp.com",
        projectId: "adasineklik-f8c9f",
        storageBucket: "adasineklik-f8c9f.firebasestorage.app",
        messagingSenderId: "612764827500",
        appId: "1:612764827500:web:5b11b94229a36336547d49",
        measurementId: "G-F1YF4VDFBL"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const userPath = "adasineklik@54_com".replace(/\./g, '_'); 

    document.getElementById('btnGiris').addEventListener('click', async () => {
        const ad = document.getElementById('loginAdSoyad').value.trim();
        const sifre = document.getElementById('loginSifre').value;

        if (!ad || !sifre) {
            alert("Lütfen tüm alanları doldurun.");
            return;
        }

        try {
            const docRef = doc(db, "Kullanicilar", userPath, "Veriler", "Musteriler");
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                const musteriler = JSON.parse(data.json_data || "[]");

                const bulunanMusteri = musteriler.find(m => 
                    m.adSoyad.toLocaleLowerCase('tr') === ad.toLocaleLowerCase('tr') && 
                    m.not === sifre
                );

                if (bulunanMusteri) {
                    // --- KRİTİK EKLENTİ: Giriş Bilgisini Hafızaya Al ---
                    sessionStorage.setItem("girisYapanMusteri", JSON.stringify(bulunanMusteri));
                    
                    alert("Giriş Başarılı! Hoş geldiniz, " + bulunanMusteri.adSoyad);
                    window.location.replace("index.html"); // Yönlendirme
                } else {
                    alert("Hatalı Ad Soyad veya Şifre!");
                }
            } else {
                alert("Henüz kayıtlı müşteri bulunamadı.");
            }
        } catch (error) {
            console.error("Hata:", error);
            alert("Giriş yapılırken bir hata oluştu.");
        }
    });
</script>

</body>
</html>
