<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ada Sineklik - Müşteri Girişi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden">
        <div class="bg-blue-600 p-10 text-white text-center">
            <h2 class="text-4xl font-black italic tracking-tighter">ADA SİNEKLİK</h2>
            <p class="text-blue-100 mt-2 opacity-80">Müşteri Paneline Giriş Yapın</p>
        </div>

        <form id="loginForm" class="p-8 space-y-6">
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase ml-1">E-Posta Adresiniz</label>
                <input type="email" id="loginEmail" required placeholder="ornek@mail.com" 
                    class="w-full px-4 py-4 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 bg-gray-50 transition-all">
            </div>

            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Şifre</label>
                    <a href="#" class="text-[10px] font-bold text-blue-600 hover:underline">Şifremi Unuttum?</a>
                </div>
                <input type="password" id="loginPassword" required placeholder="••••••••" 
                    class="w-full px-4 py-4 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 bg-gray-50 transition-all">
            </div>

            <div class="flex items-center justify-between">
                <label class="flex items-center cursor-pointer group">
                    <input type="checkbox" id="rememberMe" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                    <span class="ml-2 text-sm font-semibold text-slate-600 group-hover:text-slate-800 transition-colors">Beni Hatırla</span>
                </label>
            </div>

            <button type="submit" id="btnLogin" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-xl shadow-blue-500/30 active:scale-95 disabled:bg-slate-400">
                GİRİŞ YAP
            </button>
            
            <div class="text-center space-y-3 pt-4 border-t border-slate-100">
                <p class="text-sm text-slate-500">
                    Henüz hesabınız yok mu? 
                    <a href="kaydol.html" class="text-blue-600 font-bold hover:underline">Yeni Kayıt Oluştur</a>
                </p>
                <p class="text-[10px] text-slate-400 font-medium">Bu panel sadece kayıtlı müşterilerimiz içindir.</p>
            </div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Firebase Yapılandırmanız
        const firebaseConfig = {
            apiKey: "AIzaSyD5cilsAyJrzPzwtgIBd1w7StfAkUBAO7E",
            authDomain: "adasineklik-f8c9f.firebaseapp.com",
            projectId: "adasineklik-f8c9f",
            storageBucket: "adasineklik-f8c9f.firebasestorage.app",
            messagingSenderId: "612764827500",
            appId: "1:612764827500:web:5b11b94229a36336547d49",
            measurementId: "G-F1YF4VDFBL"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('loginEmail');
        const rememberCheck = document.getElementById('rememberMe');

        // SAYFA YÜKLENDİĞİNDE: Hatırlanan e-postayı getir
        window.onload = () => {
            const savedEmail = localStorage.getItem('rememberedEmail');
            if (savedEmail) {
                emailInput.value = savedEmail;
                rememberCheck.checked = true;
            }
        };

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            const email = emailInput.value.trim();
            const password = document.getElementById('loginPassword').value;

            btn.disabled = true;
            btn.innerText = "Giriş Yapılıyor...";

            try {
                // 1. BENİ HATIRLA MANTIĞI
                if (rememberCheck.checked) {
                    // E-postayı yerel hafızaya kaydet
                    localStorage.setItem('rememberedEmail', email);
                    // Oturumu tarayıcı kapatılsa da sakla
                    await setPersistence(auth, browserLocalPersistence);
                } else {
                    // E-postayı unut
                    localStorage.removeItem('rememberedEmail');
                    // Oturumu sadece sekme açıkken sakla
                    await setPersistence(auth, browserSessionPersistence);
                }

                // 2. GİRİŞ YAP
                await signInWithEmailAndPassword(auth, email, password);
                
                alert("Başarıyla giriş yapıldı. Hoş geldiniz!");
                window.location.href = "index.html"; // Müşterinin ana sayfasına yönlendir

            } catch (error) {
                console.error("Giriş Hatası:", error);
                let message = "E-posta veya şifre hatalı!";
                
                if (error.code === 'auth/user-not-found') message = "Bu e-posta adresi kayıtlı değil.";
                if (error.code === 'auth/wrong-password') message = "Girdiğiniz şifre yanlış.";
                if (error.code === 'auth/invalid-credential') message = "Giriş bilgileri hatalı veya süresi dolmuş.";
                
                alert("Hata: " + message);
            } finally {
                btn.disabled = false;
                btn.innerText = "GİRİŞ YAP";
            }
window.location.href = "Siparislerim.html";
        });
    </script>
</body>
</html>
