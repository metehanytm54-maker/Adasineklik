<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sipariş Oluştur - Ada Sineklik</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-lg">
        <h2 class="text-2xl font-bold mb-6 text-gray-800 text-center">Hızlı Sipariş Formu</h2>
        
        <form id="siparisForm">
            <div class="mb-4">
                <label class="block text-gray-700 font-bold mb-2">Müşteri Ad Soyad</label>
                <input type="text" id="musteriAd" class="w-full p-2 border rounded" required placeholder="Örn: Ahmet Yılmaz">
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-gray-700 font-bold mb-2">En (cm)</label>
                    <input type="number" id="en" class="w-full p-2 border rounded" required placeholder="120">
                </div>
                <div>
                    <label class="block text-gray-700 font-bold mb-2">Boy (cm)</label>
                    <input type="number" id="boy" class="w-full p-2 border rounded" required placeholder="150">
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 rounded hover:bg-blue-700 transition">
                Siparişi APK'ya Gönder
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        // BURAYI FIREBASE KONSOLUNDAN ALDIĞINIZ BİLGİLERLE DEĞİŞTİRİN
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // FORM GÖNDERME İŞLEMİ
        document.getElementById('siparisForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Android uygulamanızın (UserPath) yolu
            const userPath = "sizin_mail_adresiniz_com"; // Firebase'deki yolunuz (nokta yerine alt tire kullanıyordunuz)
            const docRef = doc(db, "Kullanicilar", userPath, "Veriler", "Siparisler");

            try {
                // 1. Mevcut siparişleri çek
                const docSnap = await getDoc(docRef);
                let tumSiparisler = [];
                if (docSnap.exists()) {
                    tumSiparisler = JSON.parse(docSnap.data().json_data || "[]");
                }

                // 2. Yeni siparişi hazırla (Android modelinizle aynı olmalı)
                const yeniSiparis = {
                    siparisKodu: "WEB-" + Math.floor(Math.random() * 10000),
                    musteriAdiSoyadi: document.getElementById('musteriAd').value,
                    olusturmaTarihi: Date.now(),
                    durum: "Yeni Sipariş",
                    maliyet: 0,
                    fiyat: 0,
                    toplamTutar: 0,
                    urunler: [{
                        model: "Web Sipariş",
                        en: document.getElementById('en').value,
                        boy: document.getElementById('boy').value,
                        adet: 1,
                        renk: "Bilinmiyor"
                    }]
                };

                // 3. Listeye ekle ve geri yükle
                tumSiparisler.unshift(yeniSiparis);
                await setDoc(docRef, { json_data: JSON.stringify(tumSiparisler) });

                alert("Sipariş başarıyla APK'ya gönderildi!");
                document.getElementById('siparisForm').reset();

            } catch (error) {
                console.error("Hata:", error);
                alert("Bir hata oluştu: " + error.message);
            }
        });
    </script>
</body>
</html>
