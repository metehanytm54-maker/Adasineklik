<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ada Sineklik - Web Sipariş Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .table-header { background-color: #2C2C2C; color: white; font-size: 12px; text-align: center; }
        input, select, textarea { border: 1px solid #ccc !important; border-radius: 6px; padding: 10px; width: 100%; font-size: 14px; background-color: white; }
        input:focus, select:focus, textarea:focus { border-color: #2563eb !important; outline: none; ring: 2px ring-blue-500; }
        .btn-delete { color: #e11d48; font-weight: bold; cursor: pointer; padding: 8px; display: inline-block; }
        /* Mobil tablo düzenlemesi */
        @media (max-width: 768px) {
            .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
            table { min-width: 850px; }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-3 md:p-6">
    <div class="max-w-6xl mx-auto bg-white shadow-2xl rounded-2xl p-4 md:p-8">
        <h1 class="text-2xl md:text-3xl font-extrabold text-gray-800 border-b pb-4 mb-6 text-center">Ada Sineklik Sipariş Paneli</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8 bg-blue-50 p-5 rounded-xl">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Müşteri Ad Soyad *</label>
                    <input type="text" id="musteriAd" placeholder="Örn: Ebubekir Yetim" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Telefon Numarası *</label>
                    <input type="tel" id="telefon" placeholder="05XXXXXXXXX" required>
                </div>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Montaj / Teslimat Adresi *</label>
                    <textarea id="adres" rows="3" placeholder="Mahalle, Sokak, No, Kat/Daire..."></textarea>
                </div>
            </div>
        </div>

        <div class="table-container border rounded-xl shadow-sm bg-white">
            <table class="w-full border-collapse">
                <thead>
                    <tr class="table-header uppercase tracking-wider">
                        <th class="p-3 border">No</th>
                        <th class="p-3 border">Yön</th>
                        <th class="p-3 border">Seri</th>
                        <th class="p-3 border">Model</th>
                        <th class="p-3 border">Renk</th>
                        <th class="p-3 border">En (cm)</th>
                        <th class="p-3 border">Boy (cm)</th>
                        <th class="p-3 border">Tül</th>
                        <th class="p-3 border">Adet</th>
                        <th class="p-3 border">İşlem</th>
                    </tr>
                </thead>
                <tbody id="urunTabloGovde" class="text-sm">
                    </tbody>
            </table>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center mt-8 gap-4">
            <button onclick="yeniSatirEkle()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-xl transition shadow-md w-full md:w-auto flex items-center justify-center">
                <span class="text-xl mr-2">+</span> Yeni Ürün Ekle
            </button>
            
            <button onclick="siparisiKaydet()" id="btnKaydet" class="bg-blue-600 hover:bg-blue-800 text-white font-bold py-5 px-14 rounded-2xl text-xl transition shadow-xl w-full md:w-auto active:scale-95">
                Siparişi Gönder
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5cilsAyJrzPzwtgIBd1w7StfAkUBAO7E",
            authDomain: "adasineklik-f8c9f.firebaseapp.com",
            projectId: "adasineklik-f8c9f",
            storageBucket: "adasineklik-f8c9f.firebasestorage.app",
            messagingSenderId: "612764827500",
            appId: "1:612764827500:web:5b11b94229a36336547d49",
            measurementId: "G-F1YF4VDFBL"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const userPath = "adasineklik@54_com"; 

        let satirSayaci = 0;

        window.yeniSatirEkle = () => {
            satirSayaci++;
            const tbody = document.getElementById('urunTabloGovde');
            const row = document.createElement('tr');
            row.id = `row-${satirSayaci}`;
            row.className = "hover:bg-gray-50 transition";
            row.innerHTML = `
                <td class="p-2 border text-center font-bold text-gray-500">${satirSayaci}</td>
                <td class="p-2 border"><select class="yon"><option>Yatay</option><option>Dikey</option></select></td>
                <td class="p-2 border"><select class="seri"><option>Kalın</option><option>İnce</option></select></td>
                <td class="p-2 border"><select class="model"><option>Tek Kanat</option><option>Duble</option><option>Triple</option><option>Menteşeli</option></select></td>
                <td class="p-2 border">
                    <select class="renk">
                        <option>Beyaz</option>
                        <option>Antrasit</option>
                        <option>Altın Meşe</option>
                        <option>Vizon</option>
                        <option>Maun</option>
                    </select>
                </td>
                <td class="p-2 border"><input type="number" class="en" placeholder="En"></td>
                <td class="p-2 border"><input type="number" class="boy" placeholder="Boy"></td>
                <td class="p-2 border"><select class="tul"><option>Standart Tül</option><option>Kedi Tül</option></select></td>
                <td class="p-2 border"><input type="number" class="adet" value="1" min="1"></td>
                <td class="p-2 border text-center"><button onclick="satirSil('row-${satirSayaci}')" class="btn-delete">SİL</button></td>
            `;
            tbody.appendChild(row);
            numaralariGuncelle();
        };

        window.satirSil = (id) => {
            if(document.querySelectorAll('#urunTabloGovde tr').length > 1) {
                document.getElementById(id).remove();
                numaralariGuncelle();
            } else {
                alert("En az bir ürün bulunmalıdır.");
            }
        };

        function numaralariGuncelle() {
            const rows = document.querySelectorAll('#urunTabloGovde tr');
            rows.forEach((r, i) => r.cells[0].innerText = i + 1);
        }

        window.siparisiKaydet = async () => {
            const musteriAd = document.getElementById('musteriAd').value.trim();
            const tel = document.getElementById('telefon').value.trim();
            const adres = document.getElementById('adres').value.trim();
            
            if(!musteriAd || !tel || !adres) return alert("Lütfen Müşteri Adı, Telefon ve Adres bilgilerini eksiksiz doldurun!");

            const urunRows = document.querySelectorAll('#urunTabloGovde tr');
            const btn = document.getElementById('btnKaydet');
            btn.disabled = true;
            btn.innerText = "Gönderiliyor...";

            try {
                const sayacRef = doc(db, "Kullanicilar", userPath, "Veriler", "SiparisSayaci");
                const siparislerRef = doc(db, "Kullanicilar", userPath, "Veriler", "Siparisler");
                
                const [sayacSnap, sipSnap] = await Promise.all([getDoc(sayacRef), getDoc(siparislerRef)]);
                
                let sonId = (sayacSnap.exists() ? sayacSnap.data().son_id : 0) + 1;
                let mevcutSiparisler = sipSnap.exists() ? JSON.parse(sipSnap.data().json_data || "[]") : [];

                const urunlerJson = Array.from(urunRows).map((row, index) => ({
                    siraNo: index + 1,
                    yon: row.querySelector('.yon').value,
                    seri: row.querySelector('.seri').value,
                    model: row.querySelector('.model').value,
                    renk: row.querySelector('.renk').value,
                    en: row.querySelector('.en').value,
                    boy: row.querySelector('.boy').value,
                    tulCinsi: row.querySelector('.tul').value,
                    adet: row.querySelector('.adet').value,
                    musteri: musteriAd
                }));

                const yeniSiparis = {
                    siparisKodu: `S-${String(sonId).padStart(4, '0')}`,
                    durum: "Online Sipariş",
                    musteriAdiSoyadi: musteriAd,
                    telefon: tel,
                    adres: adres,
                    toplamTutar: 0.0,
                    fiyat: 0.0,
                    maliyet: 0.0,
                    olusturmaTarihi: Date.now(),
                    urunler: urunlerJson
                };

                mevcutSiparisler.unshift(yeniSiparis);

                await Promise.all([
                    setDoc(siparislerRef, { json_data: JSON.stringify(mevcutSiparisler) }),
                    setDoc(sayacRef, { son_id: sonId })
                ]);

                alert(`Sipariş Başarıyla Gönderildi!\nKod: ${yeniSiparis.siparisKodu}`);
                location.reload();

            } catch (error) {
                console.error(error);
                alert("Hata oluştu: " + error.message);
                btn.disabled = false;
                btn.innerText = "Siparişi Gönder";
            }
        };

        yeniSatirEkle();
    </script>
</body>
</html>
