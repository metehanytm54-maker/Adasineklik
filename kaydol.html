<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ada Sineklik - Kayıt Ol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden">
        <div class="bg-blue-600 p-8 text-white text-center">
            <h2 class="text-3xl font-bold italic tracking-tighter">ADA SİNEKLİK</h2>
            <p class="text-blue-100 mt-2">Müşteri Kayıt Formu</p>
        </div>

        <form id="registerForm" class="p-8 space-y-4">
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase ml-1">Ad Soyad</label>
                <input type="text" id="regName" required placeholder="Ad Soyad giriniz" 
                    class="w-full px-4 py-3 border-2 border-slate-100 rounded-xl outline-none focus:border-blue-500 bg-gray-50 transition-all">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Telefon</label>
                    <input type="tel" id="regPhone" required placeholder="05XX XXX XX XX" 
                        class="w-full px-4 py-3 border-2 border-slate-100 rounded-xl outline-none focus:border-blue-500 bg-gray-50 transition-all">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">E-Posta</label>
                    <input type="email" id="regEmail" required placeholder="E-posta adresiniz" 
                        class="w-full px-4 py-3 border-2 border-slate-100 rounded-xl outline-none focus:border-blue-500 bg-gray-50 transition-all">
                </div>
            </div>

            <div>
                <label class="text-xs font-bold text-slate-500 uppercase ml-1">Adres</label>
                <textarea id="regAddress" rows="2" placeholder="Siparişleriniz için açık adres..." 
                    class="w-full px-4 py-3 border-2 border-slate-100 rounded-xl outline-none focus:border-blue-500 bg-gray-50 transition-all"></textarea>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Şifre</label>
                    <input type="password" id="regPass" required placeholder="••••••" 
                        class="w-full px-4 py-3 border-2 border-slate-100 rounded-xl outline-none focus:border-blue-500 bg-gray-50 transition-all">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Şifre Tekrar</label>
                    <input type="password" id="regPassConfirm" required placeholder="••••••" 
                        class="w-full px-4 py-3 border-2 border-slate-100 rounded-xl outline-none focus:border-blue-500 bg-gray-50 transition-all">
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg mt-4 active:scale-95 disabled:bg-slate-400">
                KAYIT OL
            </button>
            
            <p class="text-center text-sm text-slate-500 pt-2">
                Zaten hesabınız var mı? <a href="giris.html" class="text-blue-600 font-bold">Giriş Yap</a>
            </p>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Yapılandırmanız
        const firebaseConfig = {
            apiKey: "AIzaSyD5cilsAyJrzPzwtgIBd1w7StfAkUBAO7E",
            authDomain: "adasineklik-f8c9f.firebaseapp.com",
            projectId: "adasineklik-f8c9f",
            storageBucket: "adasineklik-f8c9f.firebasestorage.app",
            messagingSenderId: "612764827500",
            appId: "1:612764827500:web:5b11b94229a36336547d49",
            measurementId: "G-F1YF4VDFBL"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            
            // Verileri Al
            const name = document.getElementById('regName').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const address = document.getElementById('regAddress').value.trim();
            const pass = document.getElementById('regPass').value;
            const passConfirm = document.getElementById('regPassConfirm').value;

            // Ön Kontrol: Şifre Eşleşmesi
            if (pass !== passConfirm) {
                alert("Hata: Girdiğiniz şifreler birbiriyle uyuşmuyor!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Lütfen Bekleyin...";

            try {
                // 1. AYNI TELEFON NUMARASI KONTROLÜ
                const phoneQuery = query(collection(db, "musteriler"), where("tel", "==", phone));
                const phoneSnap = await getDocs(phoneQuery);
                if (!phoneSnap.empty) {
                    throw new Error("Bu telefon numarası ile daha önce kayıt yapılmış!");
                }

                // 2. AYNI AD SOYAD KONTROLÜ
                const nameQuery = query(collection(db, "musteriler"), where("ad", "==", name));
                const nameSnap = await getDocs(nameQuery);
                if (!nameSnap.empty) {
                    throw new Error("Bu Ad Soyad ile zaten bir müşteri kaydı mevcut!");
                }

                // 3. FIREBASE AUTH VE FIRESTORE KAYIT
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                await addDoc(collection(db, "musteriler"), {
                    ad: name,
                    tel: phone,
                    email: email,
                    adres: address,
                    uid: user.uid,
                    bakiye: 0,
                    kayitTarihi: serverTimestamp()
                });

                alert("Kaydınız başarıyla oluşturuldu! Giriş yapabilirsiniz.");
                window.location.href = "giris.html"; 

            } catch (error) {
                console.error("Kayıt Hatası:", error);
                
                // Kullanıcıya dostça hata mesajları göster
                if (error.code === 'auth/email-already-in-use') {
                    alert("Hata: Bu e-posta adresi başka bir kullanıcı tarafından kullanılıyor!");
                } else if (error.code === 'auth/weak-password') {
                    alert("Hata: Şifreniz çok zayıf (en az 6 karakter olmalı)!");
                } else {
                    alert(error.message); // throw ile attığımız "Bu telefon/isim kayıtlı" hatası buraya düşer
                }
            } finally {
                btn.disabled = false;
                btn.innerText = "KAYIT OL";
            }
        });
    </script>
</body>
</html>
