<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ada Sineklik - Müşteri Kayıt</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #1b5e20; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; resize: none; }
        button { width: 100%; padding: 14px; background: #2e7d32; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 15px; transition: 0.3s; }
        button:hover { background: #1b5e20; }
        .footer { text-align: center; font-size: 12px; color: #888; margin-top: 20px; }
        .error-hint { font-size: 11px; color: #d32f2f; margin-top: -5px; margin-bottom: 5px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Müşteri Kayıt Portalı</h2>
    <input type="text" id="adSoyad" placeholder="Ad Soyad (Zorunlu)">
    
    <input type="tel" id="telefon" placeholder="Telefon (05xx xxx xx xx)" maxlength="11">
    <div id="telHata" class="error-hint">Lütfen geçerli bir telefon girin (05xx...).</div>
    
    <input type="email" id="email" placeholder="E-posta Adresi">
    <textarea id="adres" placeholder="Adres Bilgisi" rows="3"></textarea>
    <input type="password" id="sifre" placeholder="Şifre Belirle">
    
    <button id="btnKaydet">Kayıt Ol</button>
    <div class="footer">© 2025 Ada Sineklik Sistemi</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.18.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.18.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD5cilsAyJrzPzwtgIBd1w7StfAkUBAO7E",
        authDomain: "adasineklik-f8c9f.firebaseapp.com",
        projectId: "adasineklik-f8c9f",
        storageBucket: "adasineklik-f8c9f.firebasestorage.app",
        messagingSenderId: "612764827500",
        appId: "1:612764827500:web:5b11b94229a36336547d49",
        measurementId: "G-F1YF4VDFBL"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const userPath = "adasineklik@54_com".replace(/\./g, '_'); 

    document.getElementById('btnKaydet').addEventListener('click', async () => {
        const ad = document.getElementById('adSoyad').value.trim();
        const telRaw = document.getElementById('telefon').value.replace(/\D/g,''); // Sadece rakamlar
        const mail = document.getElementById('email').value.trim();
        const adres = document.getElementById('adres').value.trim();
        const sifre = document.getElementById('sifre').value;

        // 1. AD SOYAD KONTROLÜ
        if (!ad) {
            alert("Lütfen Ad Soyad bilgisini doldurun.");
            return;
        }

        // 2. TELEFON FORMAT KONTROLÜ (05 ile başlamalı ve 11 haneli olmalı)
        const telRegex = /^05\d{9}$/;
        if (!telRegex.test(telRaw)) {
            document.getElementById('telHata').style.display = 'block';
            alert("Lütfen geçerli bir telefon numarası giriniz (Örn: 05XXXXXXXXX)");
            return;
        } else {
            document.getElementById('telHata').style.display = 'none';
        }

        // 3. ŞİFRE KONTROLÜ
        if (sifre.length < 4) {
            alert("Lütfen en az 4 haneli bir şifre belirleyin.");
            return;
        }

        try {
            const docRef = doc(db, "Kullanicilar", userPath, "Veriler", "Musteriler");
            const docSnap = await getDoc(docRef);

            let musteriListesi = [];
            if (docSnap.exists()) {
                musteriListesi = JSON.parse(docSnap.data().json_data || "[]");
            }

            // 4. MÜKERRER KAYIT KONTROLÜ (Aynı telefon var mı?)
            const varMi = musteriListesi.find(m => m.telefon === telRaw);
            if (varMi) {
                alert("Bu telefon numarası ile daha önce kayıt yapılmış. Lütfen giriş yapın.");
                return;
            }

            // 5. YENİ MÜŞTERİ NESNESİ
            const yeniMusteri = {
                adSoyad: ad,
                telefon: telRaw,
                email: mail,
                adres: adres,
                not: sifre, 
                borcMiktari: 0.0,
                toplamSatisTutari: 0.0,
                eklenmeTarihi: Date.now()
            };

            musteriListesi.unshift(yeniMusteri);

            await setDoc(docRef, {
                json_data: JSON.stringify(musteriListesi)
            });

            alert("Kaydınız başarıyla oluşturuldu!");
            window.location.href = "siparisdurumu.html"; // Kayıt sonrası yönlendirme yapabilirsin

        } catch (error) {
            console.error("Hata oluştu:", error);
            alert("Sistem şu an meşgul, lütfen az sonra tekrar deneyin.");
        }
    });
</script>

</body>
</html>
