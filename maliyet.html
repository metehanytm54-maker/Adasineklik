<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ada Sineklik - Maliyet Hesabı</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
            <div class="bg-indigo-600 p-6 text-white flex justify-between items-center">
                <h1 class="text-2xl font-black uppercase">🧮 Detaylı Maliyet Hesaplayıcı</h1>
                <a href="admin.html" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg font-bold text-sm">Geri Dön</a>
            </div>

            <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase">Sineklik Modeli / Seri</label>
                        <select id="maliyetSeri" onchange="hesapla()" class="w-full border-2 p-3 rounded-xl font-bold bg-gray-50 outline-none focus:border-indigo-500"></select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs font-bold text-gray-400 uppercase">Genişlik (cm)</label>
                            <input type="number" id="maliyetEn" oninput="hesapla()" placeholder="80" class="w-full border-2 p-3 rounded-xl outline-none focus:border-indigo-500">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-400 uppercase">Yükseklik (cm)</label>
                            <input type="number" id="maliyetBoy" oninput="hesapla()" placeholder="120" class="w-full border-2 p-3 rounded-xl outline-none focus:border-indigo-500">
                        </div>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase">Tül Cinsi</label>
                        <select id="maliyetTul" onchange="hesapla()" class="w-full border-2 p-3 rounded-xl font-bold bg-gray-50 outline-none focus:border-indigo-500"></select>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase">Ürün Adedi</label>
                        <input type="number" id="maliyetAdet" oninput="hesapla()" value="1" min="1" class="w-full border-2 p-3 rounded-xl outline-none focus:border-indigo-500">
                    </div>
                </div>

                <div class="bg-indigo-50 rounded-3xl p-8 flex flex-col justify-center border-2 border-indigo-100 border-dashed">
                    <span class="text-indigo-400 font-bold uppercase text-xs mb-2 text-center">Tahmini Toplam Maliyet</span>
                    <div class="text-6xl font-black text-indigo-900 text-center" id="toplamMaliyet">0.00₺</div>
                    <div class="mt-6 w-full space-y-2 text-sm text-indigo-700 font-medium" id="detayListesi">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5cilsAyJrzPzwtgIBd1w7StfAkUBAO7E",
            authDomain: "adasineklik-f8c9f.firebaseapp.com",
            projectId: "adasineklik-f8c9f",
            storageBucket: "adasineklik-f8c9f.firebasestorage.app",
            messagingSenderId: "612764827500",
            appId: "1:612764827500:web:5b11b94229a36336547d49"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const userPath = "adasineklik@54_com".replace(/\./g, '_');

        let birimFiyatlar = [];
        let kesimEndeksleri = [];
        let ayarlar = [];

        async function verileriYukle() {
            const docs = ["DepoMaliyetleri", "KesimEndeksleri", "UrunModelleri"];
            const snaps = await Promise.all(docs.map(d => getDoc(doc(db, "Kullanicilar", userPath, "Veriler", d))));
            
            if(snaps[0].exists()) birimFiyatlar = JSON.parse(snaps[0].data().json_data || "[]");
            if(snaps[1].exists()) kesimEndeksleri = JSON.parse(snaps[1].data().json_data || "[]");
            if(snaps[2].exists()) {
                ayarlar = snaps[2].data().liste || [];
                const seri = ayarlar.find(a => a.ad === "Seri")?.ozellikler || [];
                const tul = ayarlar.find(a => a.ad === "Tül Cinsi")?.ozellikler || [];
                
                document.getElementById('maliyetSeri').innerHTML = seri.map(s => `<option value="${s}">${s}</option>`).join('');
                document.getElementById('maliyetTul').innerHTML = tul.map(t => `<option value="${t}">${t}</option>`).join('');
            }
        }

        const formulaUygula = (deger, form) => {
            if (!form || !form.operator) return deger;
            const d = parseFloat(form.deger) || 0;
            switch (form.operator) {
                case "CIKAR": return deger - d;
                case "EKLE": return deger + d;
                case "CARP": return deger * d;
                case "BOL": return d !== 0 ? deger / d : 0;
                case "SABIT": return d;
                default: return deger;
            }
        };

        window.hesapla = () => {
            const en = parseFloat(document.getElementById('maliyetEn').value) || 0;
            const boy = parseFloat(document.getElementById('maliyetBoy').value) || 0;
            const adet = parseInt(document.getElementById('maliyetAdet').value) || 1;
            const secilenSeri = document.getElementById('maliyetSeri').value;
            const secilenTul = document.getElementById('maliyetTul').value;

            // Endeksi bul
            const e = kesimEndeksleri.find(k => k.seri === secilenSeri) || {};
            
            let toplamProfilMetraj = 0;
            let detayHtml = "";
            let genelToplam = 0;

            if (en > 0 && boy > 0) {
                // 1. Kasa EN Profil Hesapla
                const kasaEnBoy = formulaUygula(en, e.enFormulu);
                const kasaEnAdet = formulaUygula(1, e.enAdet) * adet;
                toplamProfilMetraj += (kasaEnBoy * kasaEnAdet) / 100;

                // 2. Kasa BOY Profil Hesapla
                const kasaBoyBoy = formulaUygula(boy, e.boyFormulu);
                const kasaBoyAdet = formulaUygula(1, e.boyAdet) * adet;
                toplamProfilMetraj += (kasaBoyBoy * kasaBoyAdet) / 100;

                // 3. Kanat Profil Hesapla
                const kanatKaynak = e.kanatFormulu?.kaynakBoyut === "EN" ? en : boy;
                const kanatBoy = formulaUygula(kanatKaynak, e.kanatFormulu);
                const kanatAdet = formulaUygula(1, e.kanatAdet) * adet;
                toplamProfilMetraj += (kanatBoy * kanatAdet) / 100;

                // Profil Maliyeti
                const profilFiyat = birimFiyatlar.find(b => b.seri === secilenSeri && b.metreFiyati > 0);
                if (profilFiyat) {
                    const maliyet = toplamProfilMetraj * parseFloat(profilFiyat.metreFiyati);
                    genelToplam += maliyet;
                    detayHtml += `<div class="flex justify-between"><span>Profil Toplam (${toplamProfilMetraj.toFixed(2)}m):</span><b>${maliyet.toFixed(2)}₺</b></div>`;
                }

                // 4. Tül Maliyeti (m2)
                const tulFiyat = birimFiyatlar.find(b => b.seri === secilenTul || b.ad.includes(secilenTul));
                if (tulFiyat && tulFiyat.metrekareFiyati > 0) {
                    const alan = (en / 100) * (boy / 100) * adet;
                    const maliyet = alan * parseFloat(tulFiyat.metrekareFiyati);
                    genelToplam += maliyet;
                    detayHtml += `<div class="flex justify-between"><span>Tül Toplam (${alan.toFixed(2)}m²):</span><b>${maliyet.toFixed(2)}₺</b></div>`;
                }

                // 5. Aksesuar Maliyeti (Adet bazlı)
                const aksesuar = birimFiyatlar.find(b => b.seri === secilenSeri && b.adetFiyati > 0);
                if (aksesuar) {
                    const maliyet = parseFloat(aksesuar.adetFiyati) * adet;
                    genelToplam += maliyet;
                    detayHtml += `<div class="flex justify-between"><span>Aksesuar (${adet} Takım):</span><b>${maliyet.toFixed(2)}₺</b></div>`;
                }
            }

            document.getElementById('toplamMaliyet').innerText = genelToplam.toFixed(2) + "₺";
            document.getElementById('detayListesi').innerHTML = detayHtml;
        };

        verileriYukle().then(() => {
            // İlk açılışta boş hesaplama
            hesapla();
        });
    </script>
</body>
</html>
