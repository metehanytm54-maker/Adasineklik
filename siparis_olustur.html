<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ada Sineklik | Sipariş Oluştur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="text-slate-900">

    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <a href="siparislerim.html" class="text-blue-600 font-bold text-sm">← Geri Dön</a>
                <h1 class="text-xl font-black text-slate-800 ml-4 tracking-tighter">YENİ SİPARİŞ</h1>
            </div>
            <div id="userName" class="text-sm font-bold text-slate-500 italic">Oturum kontrol ediliyor...</div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-1 bg-white p-6 rounded-[32px] shadow-sm border h-fit">
            <h3 class="text-lg font-black mb-6 flex items-center gap-2">
                <span class="w-8 h-8 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center text-sm">1</span>
                Ürün Bilgileri
            </h3>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Model</label>
                    <select id="model" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                        <option>Plise Sineklik</option>
                        <option>Menteşeli Sineklik</option>
                        <option>Sürme Sineklik</option>
                        <option>Stor Sineklik</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">En (cm)</label>
                        <input type="number" id="en" placeholder="0" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Boy (cm)</label>
                        <input type="number" id="boy" placeholder="0" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Renk</label>
                    <select id="renk" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                        <option>Beyaz</option>
                        <option>Altın Meşe</option>
                        <option>Antrasit Gri</option>
                        <option>Maun</option>
                    </select>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Tül Cinsi</label>
                    <select id="tul" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                        <option>Standart Fiber</option>
                        <option>Kedi Tülü (Çelik)</option>
                        <option>Plise Tül</option>
                    </select>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Adet</label>
                    <input type="number" id="adet" value="1" min="1" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                </div>

                <button id="btnAddToList" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold hover:bg-slate-700 transition shadow-lg flex items-center justify-center gap-2">
                    <span>+</span> LİSTEYE EKLE
                </button>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-6">
            <div class="bg-white p-6 rounded-[32px] shadow-sm border min-h-[400px] flex flex-col">
                <h3 class="text-lg font-black mb-6 flex items-center gap-2">
                    <span class="w-8 h-8 bg-emerald-100 text-emerald-600 rounded-lg flex items-center justify-center text-sm">2</span>
                    Sipariş Listesi
                </h3>

                <div class="flex-grow overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-[10px] font-bold text-slate-400 uppercase border-b">
                                <th class="pb-3">Model</th>
                                <th class="pb-3 text-center">Ölçü</th>
                                <th class="pb-3 text-center">Özellik</th>
                                <th class="pb-3 text-center">Adet</th>
                                <th class="pb-3 text-right">İşlem</th>
                            </tr>
                        </thead>
                        <tbody id="cartTableBody" class="text-sm"></tbody>
                    </table>
                    <div id="emptyState" class="py-20 text-center text-slate-400 font-medium">Henüz ürün eklemediniz.</div>
                </div>

                <div class="mt-6 pt-6 border-t flex flex-col md:flex-row justify-between items-center gap-4">
                    <div class="text-center md:text-left">
                        <p class="text-xs text-slate-400 font-bold uppercase">Toplam Durum</p>
                        <p id="totalItemsCount" class="text-2xl font-black text-slate-800">0 Kalem / 0 Adet</p>
                    </div>
                    <button id="btnFinishOrder" disabled class="w-full md:w-auto bg-blue-600 text-white px-12 py-4 rounded-2xl font-bold hover:bg-blue-700 transition disabled:bg-slate-200 shadow-xl shadow-blue-500/20">
                        SİPARİŞİ TAMAMLA VE GÖNDER
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5cilsAyJrzPzwtgIBd1w7StfAkUBAO7E",
            authDomain: "adasineklik-f8c9f.firebaseapp.com",
            projectId: "adasineklik-f8c9f",
            storageBucket: "adasineklik-f8c9f.firebasestorage.app",
            messagingSenderId: "612764827500",
            appId: "1:612764827500:web:5b11b94229a36336547d49"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let cart = [];

        // Auth Kontrolü
       // Auth Kontrolü - İyileştirilmiş Versiyon
onAuthStateChanged(auth, async (user) => {
    const nameDisplay = document.getElementById('userName');
    if (user) {
        console.log("Giriş yapan e-posta:", user.email);
        try {
            // musteriler koleksiyonunda e-postayı ara
            const q = query(collection(db, "musteriler"), where("email", "==", user.email));
            const snap = await getDocs(q);
            
            if (!snap.empty) {
                currentUser = snap.docs[0].data();
                nameDisplay.innerText = "👤 " + currentUser.ad;
                console.log("Müşteri verisi yüklendi:", currentUser);
            } else {
                // Eğer musteriler koleksiyonunda yoksa, auth ismini kullan
                currentUser = { 
                    ad: user.displayName || user.email.split('@')[0], 
                    email: user.email 
                };
                nameDisplay.innerText = "👤 " + currentUser.ad + " (Geçici)";
                console.log("Koleksiyonda bulunamadı, Auth bilgisi kullanılıyor.");
            }
        } catch (err) {
            console.error("Firestore hatası:", err);
            nameDisplay.innerText = "⚠️ Veri yükleme hatası!";
        }
    } else {
        window.location.href = "giris.html";
    }
});

        // Listeye Ekleme
        document.getElementById('btnAddToList').addEventListener('click', () => {
            const model = document.getElementById('model').value;
            const en = document.getElementById('en').value;
            const boy = document.getElementById('boy').value;
            const renk = document.getElementById('renk').value;
            const tul = document.getElementById('tul').value;
            const adet = parseInt(document.getElementById('adet').value);

            if (!en || !boy || isNaN(adet) || adet < 1) {
                alert("Lütfen tüm alanları geçerli şekilde doldurun!");
                return;
            }

            cart.push({ id: Date.now(), model, en, boy, renk, tul, adet });
            updateTable();
            document.getElementById('en').value = "";
            document.getElementById('boy').value = "";
        });

        function updateTable() {
            const body = document.getElementById('cartTableBody');
            const empty = document.getElementById('emptyState');
            const btnFinish = document.getElementById('btnFinishOrder');
            body.innerHTML = "";
            let totalQty = 0;

            if (cart.length === 0) {
                empty.style.display = "block";
                btnFinish.disabled = true;
            } else {
                empty.style.display = "none";
                btnFinish.disabled = false;
                cart.forEach((item, index) => {
                    totalQty += item.adet;
                    body.innerHTML += `
                        <tr class="border-b border-slate-50">
                            <td class="py-4 font-bold text-slate-700">${item.model}</td>
                            <td class="py-4 text-center">${item.en}x${item.boy}</td>
                            <td class="py-4 text-center text-[11px] text-slate-500">${item.renk} / ${item.tul}</td>
                            <td class="py-4 text-center font-black">${item.adet}</td>
                            <td class="py-4 text-right">
                                <button onclick="window.removeFromCart(${item.id})" class="text-red-500 font-bold hover:underline text-xs">Sil</button>
                            </td>
                        </tr>`;
                });
            }
            document.getElementById('totalItemsCount').innerText = `${cart.length} Kalem / ${totalQty} Adet`;
        }

        window.removeFromCart = (id) => {
            cart = cart.filter(i => i.id !== id);
            updateTable();
        };

        // GÖNDERME İŞLEMİ (Çalışmayan Kısım Düzeltildi)
        document.getElementById('btnFinishOrder').addEventListener('click', async () => {
            if (!currentUser) {
                alert("Oturum bilgileriniz henüz yüklenmedi, lütfen bekleyin...");
                return;
            }
            if (cart.length === 0) return;

            const btn = document.getElementById('btnFinishOrder');
            btn.disabled = true;
            btn.innerText = "Gönderiliyor...";

            try {
                const siparisVerisi = {
                    musteri: currentUser.ad,
                    musteriEmail: currentUser.email,
                    urunler: cart, // Tüm sepet dizi olarak gidiyor
                    kalemSayisi: cart.length,
                    toplamAdet: cart.reduce((s, i) => s + i.adet, 0),
                    durum: "Beklemede",
                    tarih: serverTimestamp(),
                    toplamFiyat: 0
                };

                await addDoc(collection(db, "siparisler"), siparisVerisi);
                
                alert("Siparişiniz başarıyla iletildi!");
                window.location.href = "siparislerim.html";

            } catch (error) {
                console.error("Kayıt hatası:", error);
                alert("Sipariş gönderilemedi: " + error.message);
                btn.disabled = false;
                btn.innerText = "SİPARİŞİ TAMAMLA VE GÖNDER";
            }
        });
    </script>
</body>
</html>
