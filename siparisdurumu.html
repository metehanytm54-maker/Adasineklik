<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hesap Özeti - Ada Sineklik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .siparis-layout { background: white; border-radius: 12px; border: 2px solid #e5e7eb; overflow: hidden; margin-bottom: 2rem; }
        .product-table-header { background-color: #2C2C2C; color: white; }
        .badge-status { padding: 4px 10px; border-radius: 999px; font-weight: 600; font-size: 12px; }
        .summary-card { background: white; border: 2px solid #e5e7eb; border-radius: 16px; padding: 20px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <div class="flex items-center justify-between mb-6">
            <button onclick="window.location.href='index.html'" class="flex items-center text-blue-600 font-semibold hover:underline">
                <span class="mr-2">←</span> Geri Dön
            </button>
            <h1 class="text-xl font-bold text-gray-800">Hesap Özeti</h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div class="summary-card flex justify-between items-center">
                <div>
                    <p class="text-sm font-bold text-gray-400 uppercase">Toplam Harcama</p>
                    <p id="toplamHarcama" class="text-2xl font-black text-gray-800">0,00 TL</p>
                </div>
                <div class="bg-blue-50 p-3 rounded-full"><span class="text-2xl">💰</span></div>
            </div>
            <div class="summary-card flex justify-between items-center border-orange-200 bg-orange-50/30">
                <div>
                    <p class="text-sm font-bold text-orange-400 uppercase">Kalan Cari Borç</p>
                    <p id="cariBorc" class="text-2xl font-black text-orange-600">0,00 TL</p>
                </div>
                <div class="bg-orange-100 p-3 rounded-full"><span class="text-2xl">⏳</span></div>
            </div>
        </div>

        <div id="anaIcerik" class="space-y-6">
            <div class="text-center py-10 text-gray-500">Veriler yükleniyor...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5cilsAyJrzPzwtgIBd1w7StfAkUBAO7E",
            authDomain: "adasineklik-f8c9f.firebaseapp.com",
            projectId: "adasineklik-f8c9f",
            storageBucket: "adasineklik-f8c9f.firebasestorage.app",
            messagingSenderId: "612764827500",
            appId: "1:612764827500:web:5b11b94229a36336547d49"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const userPath = "adasineklik@54_com".replace(/\./g, '_');

        async function verileriYukle() {
            const container = document.getElementById('anaIcerik');
            const hamVeri = sessionStorage.getItem("girisYapanMusteri");
            
            if (!hamVeri) {
                container.innerHTML = "Oturum açılmamış.";
                return;
            }

            const aktifMusteri = JSON.parse(hamVeri);
            const musteriAd = aktifMusteri.adSoyad;
            const musteriTel = aktifMusteri.telefon;

            try {
                const [sipSnap, odeSnap] = await Promise.all([
                    getDoc(doc(db, "Kullanicilar", userPath, "Veriler", "Siparisler")),
                    getDoc(doc(db, "Kullanicilar", userPath, "Veriler", "Odemeler"))
                ]);

                const tumSiparisler = sipSnap.exists() ? JSON.parse(sipSnap.data().json_data || "[]") : [];
                const tumOdemeler = odeSnap.exists() ? JSON.parse(odeSnap.data().json_data || "[]") : [];

                const musterininSiparisleri = tumSiparisler.filter(s => s.telefon === musteriTel);
                const musterininOdemeleri = tumOdemeler.filter(o => o.musteriAdiSoyadi === musteriAd);

                const tHarcama = musterininSiparisleri.reduce((sum, s) => sum + (Number(s.toplamTutar) || 0), 0);
                const tOdenen = musterininOdemeleri.reduce((sum, o) => sum + (Number(o.tutar) || 0), 0);
                const kBorc = tHarcama - tOdenen;

                document.getElementById('toplamHarcama').innerText = tHarcama.toLocaleString('tr-TR') + " TL";
                document.getElementById('cariBorc').innerText = kBorc.toLocaleString('tr-TR') + " TL";

                let html = "";

                // ÖDEMELER
                if (musterininOdemeleri.length > 0) {
                    html += `<div class="siparis-layout p-5 border-blue-200 bg-blue-50/20">
                                <h3 class="font-black text-blue-800 mb-4 uppercase text-xs">💳 Ödeme Geçmişi</h3>
                                <div class="space-y-3">
                                    ${musterininOdemeleri.sort((a,b) => b.tarih - a.tarih).map(o => `
                                        <div class="flex justify-between items-center bg-white p-3 rounded-lg border border-blue-100 shadow-sm">
                                            <div>
                                                <p class="text-[10px] text-gray-400 font-bold">${new Date(o.tarih).toLocaleDateString('tr-TR')}</p>
                                                <p class="font-bold text-gray-700 italic">Tahsilat Edildi</p>
                                            </div>
                                            <p class="text-lg font-black text-blue-600">+ ${Number(o.tutar).toLocaleString('tr-TR')} TL</p>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>`;
                }

                // SİPARİŞLER
                if (musterininSiparisleri.length > 0) {
                    html += musterininSiparisleri.map(sip => `
                        <div class="siparis-layout">
                            <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
                                <div>
                                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Kod: ${sip.siparisKodu}</span>
                                    <p class="font-black text-gray-800">${new Date(sip.olusturmaTarihi).toLocaleDateString('tr-TR')}</p>
                                </div>
                                <div class="text-right">
                                    <span class="badge-status ${sip.durum === 'Tamamlandı' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}">${sip.durum}</span>
                                    <p class="font-bold text-gray-800 mt-1">${Number(sip.toplamTutar).toLocaleString('tr-TR')} TL</p>
                                </div>
                            </div>
                            <table class="w-full text-left">
                                <thead class="product-table-header text-[11px] uppercase tracking-wide">
                                    <tr><th class="px-4 py-2">Ürün Bilgileri</th><th class="px-4 py-2 text-center">Ölçü</th><th class="px-4 py-2 text-center">Adet</th></tr>
                                </thead>
                                <tbody class="divide-y divide-gray-100">
                                    ${sip.urunler.map(u => `
                                        <tr>
                                            <td class="px-4 py-4 text-sm">
                                                <div class="font-bold text-gray-800 text-base">${u.model} <span class="text-gray-400 font-normal">(${u.seri})</span></div>
                                                <div class="text-[12px] text-gray-500 mt-1">
                                                    <b>Renk:</b> ${u.renk} | <b>Yön:</b> ${u.yon} | <b>Tül:</b> ${u.tulCinsi}
                                                </div>
                                            </td>
                                            <td class="px-4 py-4 text-center font-bold text-gray-600 text-base">${u.en} x ${u.boy}</td>
                                            <td class="px-4 py-4 text-center font-bold text-gray-800 text-base">${u.adet} Ad.</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `).join('');
                }

                container.innerHTML = html || '<p class="text-center text-gray-400">İşlem kaydı bulunamadı.</p>';

            } catch (err) {
                console.error(err);
                container.innerHTML = "Veriler yüklenirken bir hata oluştu.";
            }
        }

        verileriYukle();
    </script>
</body>
</html>
