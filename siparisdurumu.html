<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sipariş Durumu - Ada Sineklik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Sipariş kartı için çerçeve ve tasarım ayarları */
        .siparis-layout { 
            background: white; 
            border-radius: 12px; 
            border: 2px solid #e5e7eb; /* Belirgin çerçeve */
            overflow: hidden;
            margin-bottom: 2rem;
        }
        .product-table-header { background-color: #2C2C2C; color: white; }
        .badge-status { padding: 6px 12px; border-radius: 999px; font-weight: 600; font-size: 14px; }
        .text-detail { color: #6b7280; font-size: 13px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <div class="flex items-center justify-between mb-8">
            <button onclick="window.location.href='index.html'" class="flex items-center text-blue-600 font-semibold hover:underline">
                <span class="mr-2">←</span> Sipariş Paneline Dön
            </button>
            <h1 class="text-2xl font-bold text-gray-800">Sipariş Durumum</h1>
        </div>

        <div id="siparisListesi" class="space-y-6">
            <div class="text-center py-10 text-gray-500">Yükleniyor...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5cilsAyJrzPzwtgIBd1w7StfAkUBAO7E",
            authDomain: "adasineklik-f8c9f.firebaseapp.com",
            projectId: "adasineklik-f8c9f",
            storageBucket: "adasineklik-f8c9f.firebasestorage.app",
            messagingSenderId: "612764827500",
            appId: "1:612764827500:web:5b11b94229a36336547d49",
            measurementId: "G-F1YF4VDFBL"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const userPath = "adasineklik@54_com".replace(/\./g, '_');

        async function siparisleriYukle() {
            const container = document.getElementById('siparisListesi');
            const hamVeri = sessionStorage.getItem("girisYapanMusteri");
            
            if (!hamVeri) {
                container.innerHTML = `<div class="p-6 bg-red-50 text-red-600 rounded-xl">Oturum bilgisi bulunamadı.</div>`;
                return;
            }

            const aktifMusteri = JSON.parse(hamVeri);

            try {
                const sipRef = doc(db, "Kullanicilar", userPath, "Veriler", "Siparisler");
                const snap = await getDoc(sipRef);

                if (snap.exists()) {
                    const tumSiparisler = JSON.parse(snap.data().json_data || "[]");
                    // Telefon numarasına göre filtreleme
                    const musterininSiparisleri = tumSiparisler.filter(s => s.telefon === aktifMusteri.telefon);

                    if (musterininSiparisleri.length === 0) {
                        container.innerHTML = `<div class="p-10 text-center text-gray-500 bg-white rounded-2xl border-2 border-dashed">Henüz bir siparişiniz bulunmuyor.</div>`;
                        return;
                    }

                    container.innerHTML = musterininSiparisleri.map(sip => `
                        <div class="siparis-layout">
                            <div class="p-5 border-b bg-gray-50 flex flex-wrap justify-between items-center gap-4">
                                <div>
                                    <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Sipariş Kodu</span>
                                    <p class="text-lg font-extrabold text-gray-800">${sip.siparisKodu}</p>
                                </div>
                                <div class="flex items-center gap-6">
                                    <div class="text-right">
                                        <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Satış Tutarı</span>
                                        <p class="text-lg font-bold text-green-600">${sip.toplamTutar > 0 ? sip.toplamTutar + ' TL' : 'Fiyat Bekleniyor'}</p>
                                    </div>
                                    <div class="text-right">
                                        <span class="text-xs font-bold text-gray-400 uppercase tracking-widest block mb-1">Durum</span>
                                        <span class="badge-status ${sip.durum === 'Tamamlandı' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}">
                                            ${sip.durum}
                                        </span>
                                    </div>
                                </div>
                            </div>

                            <div class="overflow-x-auto">
                                <table class="w-full text-left">
                                    <thead>
                                        <tr class="product-table-header text-[12px] uppercase">
                                            <th class="px-6 py-3 text-white">Ürün Bilgileri (Detaylı)</th>
                                            <th class="px-6 py-3 text-center text-white">Ölçü</th>
                                            <th class="px-6 py-3 text-center text-white">Adet</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-gray-100">
                                        ${sip.urunler.map(u => `
                                            <tr class="hover:bg-gray-50 transition">
                                                <td class="px-6 py-4">
                                                    <div class="font-bold text-gray-800 text-base">${u.model} (${u.seri})</div>
                                                    <div class="text-detail mt-1">
                                                        Renk: <span class="text-gray-700 font-medium">${u.renk}</span> | 
                                                        Tül: <span class="text-gray-700 font-medium">${u.tulCinsi}</span> | 
                                                        Yön: <span class="text-gray-700 font-medium">${u.yon}</span>
                                                    </div>
                                                </td>
                                                <td class="px-6 py-4 text-center font-bold text-gray-700 text-base">
                                                    ${u.en} x ${u.boy}
                                                </td>
                                                <td class="px-6 py-4 text-center font-bold text-gray-700 text-base">
                                                    ${u.adet} Ad.
                                                </td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    `).join('');

                } else {
                    container.innerHTML = `<div class="p-10 text-center text-gray-500">Veri bulunamadı.</div>`;
                }
            } catch (error) {
                console.error(error);
                container.innerHTML = `<div class="p-6 bg-red-50 text-red-600 rounded-xl">Hata: ${error.message}</div>`;
            }
        }

        siparisleriYukle();
    </script>
</body>
</html>
