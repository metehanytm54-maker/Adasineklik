<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ada Sineklik - Sipariş Geçmişim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .siparis-card { border-left: 5px solid #2563eb; transition: transform 0.2s; }
        .siparis-card:hover { transform: translateY(-3px); }
        .durum-badge { padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: bold; }
        .durum-yeni { background: #dbeafe; color: #1e40af; }
        .durum-imalat { background: #fef3c7; color: #92400e; }
        .durum-tamam { background: #dcfce7; color: #166534; }
        .durum-online { background: #f3e8ff; color: #6b21a8; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div id="mainContent" style="display: none;" class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Sipariş Geçmişim</h1>
            <button onclick="window.location.href='index.html'" class="bg-gray-600 text-white px-4 py-2 rounded-lg text-sm">Geri Dön</button>
        </div>

        <div id="musteriOzet" class="bg-white p-4 rounded-xl shadow-sm mb-6 flex justify-between items-center border border-blue-100">
            <div>
                <p class="text-sm text-gray-500">Hoş geldiniz,</p>
                <p id="ozetAd" class="font-bold text-lg text-blue-900"></p>
            </div>
            <div class="text-right">
                <p class="text-sm text-gray-500">Toplam Harcama</p>
                <p id="genelToplam" class="font-bold text-xl text-green-600">0.00 TL</p>
            </div>
        </div>

        <div id="siparisListesi" class="space-y-4">
            <div class="text-center py-10 text-gray-500">Siparişleriniz yükleniyor...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5cilsAyJrzPzwtgIBd1w7StfAkUBAO7E",
            authDomain: "adasineklik-f8c9f.firebaseapp.com",
            projectId: "adasineklik-f8c9f",
            storageBucket: "adasineklik-f8c9f.firebasestorage.app",
            messagingSenderId: "612764827500",
            appId: "1:612764827500:web:5b11b94229a36336547d49"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const userPath = "adasineklik@54_com".replace(/\./g, '_');

        const hamVeri = sessionStorage.getItem("girisYapanMusteri");
        if (!hamVeri) {
            window.location.replace("giris.html");
        } else {
            const aktifMusteri = JSON.parse(hamVeri);
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('ozetAd').innerText = aktifMusteri.adSoyad;
            siparisleriGetir(aktifMusteri);
        }

        async function siparisleriGetir(musteri) {
            try {
                const docRef = doc(db, "Kullanicilar", userPath, "Veriler", "Siparisler");
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const tumSiparisler = JSON.parse(docSnap.data().json_data || "[]");
                    
                    // Sadece bu müşteriye ait siparişleri filtrele (Ad Soyad ve Telefon eşleşmesi)
                    const filtrelenmis = tumSiparisler.filter(s => 
                        s.musteriAdiSoyadi.toLowerCase() === musteri.adSoyad.toLowerCase() &&
                        (s.telefon === musteri.telefon || s.telefon === musteri.tel)
                    );

                    const listeDiv = document.getElementById('siparisListesi');
                    listeDiv.innerHTML = "";
                    let toplamHarcama = 0;

                    if (filtrelenmis.length === 0) {
                        listeDiv.innerHTML = `<div class="bg-white p-8 rounded-xl text-center text-gray-500">Henüz bir siparişiniz bulunmuyor.</div>`;
                        return;
                    }

                    filtrelenmis.forEach(siparis => {
                        const tutar = siparis.toplamTutar > 0 ? siparis.toplamTutar : siparis.fiyat;
                        toplamHarcama += tutar;

                        const tarih = new Date(siparis.olusturmaTarihi).toLocaleDateString('tr-TR');
                        
                        let durumClass = "durum-yeni";
                        if(siparis.durum.includes("İmalat")) durumClass = "durum-imalat";
                        if(siparis.durum.includes("Tamam")) durumClass = "durum-tamam";
                        if(siparis.durum.includes("Online")) durumClass = "durum-online";

                        const urunlerHtml = siparis.urunler.map(u => 
                            `<div class="text-xs text-gray-600 border-b border-gray-50 py-1">
                                ${u.adet} Adet - ${u.model} (${u.en}x${u.boy}) - ${u.renk}
                            </div>`
                        ).join('');

                        listeDiv.innerHTML += `
                            <div class="bg-white p-5 rounded-xl shadow-sm siparis-card border border-gray-200">
                                <div class="flex justify-between items-start mb-3">
                                    <div>
                                        <span class="text-xs font-bold text-blue-600">${siparis.siparisKodu}</span>
                                        <p class="text-xs text-gray-400">${tarih}</p>
                                    </div>
                                    <span class="durum-badge ${durumClass}">${siparis.durum}</span>
                                </div>
                                <div class="mb-4">
                                    <p class="text-sm font-bold text-gray-700 mb-2">Ürün Detayları:</p>
                                    ${urunHtml(siparis.urunler)}
                                </div>
                                <div class="flex justify-between items-center pt-3 border-t border-dashed">
                                    <span class="text-sm text-gray-500">Sipariş Tutarı:</span>
                                    <span class="font-bold text-lg text-gray-800">${tutar.toFixed(2)} TL</span>
                                </div>
                            </div>
                        `;
                    });

                    document.getElementById('genelToplam').innerText = toplamHarcama.toFixed(2) + " TL";
                }
            } catch (error) {
                console.error("Hata:", error);
            }
        }

        function urunHtml(urunler) {
            return urunler.map(u => `
                <div class="flex justify-between text-xs py-1 border-b border-gray-50">
                    <span>${u.adet}x ${u.model} (${u.renk})</span>
                    <span class="text-gray-400">${u.en}x${u.boy}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
