<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ada Sineklik - Ham Malzeme Stok</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 100; padding: 15px; }
        .modal.active { display: flex; }
        .modal-content { background: white; width: 100%; max-width: 500px; border-radius: 16px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <div class="flex justify-between items-center mb-8 bg-white p-5 rounded-xl border shadow-sm">
            <div>
                <button onclick="window.location.href='admin.html'" class="text-gray-400 text-xs font-bold hover:text-blue-600 mb-1 block">← Panele Dön</button>
                <h1 class="text-xl font-black text-gray-800 uppercase tracking-tight">Ham Malzeme Stok Yönetimi</h1>
            </div>
            <button onclick="stokModalAc()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition shadow-lg">+ Yeni Stok Ekle</button>
        </div>

        <div class="bg-white rounded-xl border shadow-sm overflow-hidden">
            <table class="w-full text-left text-sm">
                <thead class="bg-gray-50 text-gray-400 text-[10px] uppercase font-bold border-b">
                    <tr>
                        <th class="p-4">Malzeme / Seri</th>
                        <th class="p-4">Renk</th>
                        <th class="p-4 text-center">Adet</th>
                        <th class="p-4 text-center">Metre / m²</th>
                        <th class="p-4 text-right">İşlem</th>
                    </tr>
                </thead>
                <tbody id="stokTablosu" class="divide-y text-gray-700">
                    <tr><td colspan="5" class="p-10 text-center">Yükleniyor...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="stokModal" class="modal">
        <div class="modal-content p-6 shadow-2xl">
            <div class="flex justify-between items-center border-b pb-4 mb-4">
                <h2 id="modalBaslik" class="text-lg font-bold text-gray-800 uppercase">Stok Girişi</h2>
                <button onclick="modalKapat()" class="text-2xl text-gray-400 hover:text-red-500">&times;</button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Malzeme Adı</label>
                    <select id="selMalzeme" onchange="malzemeDegisti()" class="w-full border p-2.5 rounded-lg outline-none focus:ring-2 focus:ring-blue-500"></select>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label id="lblSeri" class="text-[10px] font-bold text-gray-400 uppercase">Seri</label>
                        <select id="selSeri" class="w-full border p-2.5 rounded-lg outline-none"></select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Renk</label>
                        <select id="selRenk" class="w-full border p-2.5 rounded-lg outline-none"></select>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-3 bg-blue-50 p-4 rounded-xl border border-blue-100">
                    <div>
                        <label class="text-[10px] font-bold text-blue-400 uppercase">Adet</label>
                        <input type="number" id="inpAdet" placeholder="0" class="w-full border p-2 rounded-lg font-bold">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-blue-400 uppercase">Metre</label>
                        <input type="number" id="inpMetre" placeholder="0" class="w-full border p-2 rounded-lg font-bold">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-blue-400 uppercase">m²</label>
                        <input type="number" id="inpMetreKare" placeholder="0" class="w-full border p-2 rounded-lg font-bold">
                    </div>
                </div>

                <button onclick="stokKaydet()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg transition uppercase tracking-wider">Veriyi Kaydet</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5cilsAyJrzPzwtgIBd1w7StfAkUBAO7E",
            authDomain: "adasineklik-f8c9f.firebaseapp.com",
            projectId: "adasineklik-f8c9f",
            storageBucket: "adasineklik-f8c9f.firebasestorage.app",
            messagingSenderId: "612764827500",
            appId: "1:612764827500:web:5b11b94229a36336547d49"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const userPath = "adasineklik@54_com".replace(/\./g, '_');

        let stokListesi = [];
        let anaMalzemeAdlari = [];
        let seriListesi = [];
        let renkListesi = [];
        let tulListesi = [];
        let duzenlenenId = null;

        async function verileriYukle() {
            try {
                const docs = ["StokListesi", "AnaMalzemeAdlari", "UrunModelleri"];
                const snaps = await Promise.all(docs.map(d => getDoc(doc(db, "Kullanicilar", userPath, "Veriler", d))));
                
                if (snaps[0].exists()) stokListesi = JSON.parse(snaps[0].data().json_data || "[]");
                if (snaps[1].exists()) anaMalzemeAdlari = JSON.parse(snaps[1].data().json_data || "[]");
                
                if (snaps[2].exists()) {
                    const data = snaps[2].data().liste || [];
                    data.forEach(item => {
                        if(item.ad === "Seri") seriListesi = item.ozellikler || [];
                        if(item.ad === "Renk") renkListesi = item.ozellikler || [];
                        if(item.ad === "Tül Cinsi") tulListesi = item.ozellikler || [];
                    });
                }
                
                renderStoklar();
                setupSpinners();
            } catch (err) { console.error("Veri yükleme hatası:", err); }
        }

        function setupSpinners() {
            fillSelect("selMalzeme", anaMalzemeAdlari, "Malzeme");
            fillSelect("selRenk", renkListesi, "Renk");
            malzemeDegisti(); // İlk yüklemede seri spinnerını ayarla
        }

        function fillSelect(id, list, hint) {
            const el = document.getElementById(id);
            el.innerHTML = `<option value="">--- ${hint} Seçiniz ---</option>` + 
                           list.map(i => `<option value="${i}">${i}</option>`).join('');
        }

        window.malzemeDegisti = () => {
            const secilenMalzeme = document.getElementById('selMalzeme').value;
            const lblSeri = document.getElementById('lblSeri');
            
            if(secilenMalzeme.toLowerCase().includes("tül")) {
                lblSeri.innerText = "TÜL CİNSİ";
                fillSelect("selSeri", tulListesi, "Tül Cinsi");
            } else {
                lblSeri.innerText = "SERİ";
                fillSelect("selSeri", seriListesi, "Seri");
            }
        };

        function renderStoklar() {
            const tbody = document.getElementById('stokTablosu');
            if(stokListesi.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-gray-400">Stok kaydı bulunamadı.</td></tr>`;
                return;
            }
            tbody.innerHTML = stokListesi.map((s, idx) => `
                <tr class="hover:bg-blue-50/50 transition">
                    <td class="p-4">
                        <div class="font-bold text-gray-800">${s.ad}</div>
                        <div class="text-[10px] text-blue-500 font-bold uppercase">${s.seri}</div>
                    </td>
                    <td class="p-4 text-gray-500">${s.renk}</td>
                    <td class="p-4 text-center font-black text-gray-700">${s.adet} Ad.</td>
                    <td class="p-4 text-center text-xs">
                        <span class="block">📏 ${s.metre} mt.</span>
                        <span class="block">🔳 ${s.metrekare} m²</span>
                    </td>
                    <td class="p-4 text-right space-x-3">
                        <button onclick="stokDuzenle('${s.id}')" class="text-blue-600 font-bold text-xs">Düzenle</button>
                        <button onclick="stokSil('${s.id}')" class="text-red-600 font-bold text-xs">Sil</button>
                    </td>
                </tr>
            `).join('');
        }

        window.stokModalAc = () => {
            duzenlenenId = null;
            document.getElementById('modalBaslik').innerText = "Yeni Stok Girişi";
            document.getElementById('selMalzeme').value = "";
            document.getElementById('selSeri').value = "";
            document.getElementById('selRenk').value = "";
            document.getElementById('inpAdet').value = "";
            document.getElementById('inpMetre').value = "";
            document.getElementById('inpMetreKare').value = "";
            document.getElementById('stokModal').classList.add('active');
        };

        window.stokDuzenle = (id) => {
            const s = stokListesi.find(item => item.id === id);
            if(!s) return;
            duzenlenenId = id;
            document.getElementById('modalBaslik').innerText = "Stoku Güncelle";
            document.getElementById('selMalzeme').value = s.ad;
            malzemeDegisti();
            document.getElementById('selSeri').value = s.seri;
            document.getElementById('selRenk').value = s.renk;
            document.getElementById('inpAdet').value = s.adet;
            document.getElementById('inpMetre').value = s.metre;
            document.getElementById('inpMetreKare').value = s.metrekare;
            document.getElementById('stokModal').classList.add('active');
        };

        window.stokKaydet = async () => {
            const ad = document.getElementById('selMalzeme').value;
            if(!ad) { alert("Lütfen malzeme seçin!"); return; }

            const yeni = {
                id: duzenlenenId || crypto.randomUUID(),
                ad: ad,
                seri: document.getElementById('selSeri').value || "Yok",
                renk: document.getElementById('selRenk').value || "Yok",
                adet: document.getElementById('inpAdet').value || "0",
                metre: document.getElementById('inpMetre').value || "0",
                metrekare: document.getElementById('inpMetreKare').value || "0",
                olusturmaTarihi: Date.now()
            };

            const idx = stokListesi.findIndex(item => item.id === yeni.id);
            if(idx !== -1) stokListesi[idx] = yeni;
            else stokListesi.unshift(yeni);

            await setDoc(doc(db, "Kullanicilar", userPath, "Veriler", "StokListesi"), { 
                json_data: JSON.stringify(stokListesi) 
            });

            modalKapat();
            verileriYukle();
        };

        window.stokSil = async (id) => {
            if(!confirm("Bu stok kaydını silmek istediğinize emin misiniz?")) return;
            stokListesi = stokListesi.filter(item => item.id !== id);
            await setDoc(doc(db, "Kullanicilar", userPath, "Veriler", "StokListesi"), { 
                json_data: JSON.stringify(stokListesi) 
            });
            verileriYukle();
        };

        window.modalKapat = () => document.getElementById('stokModal').classList.remove('active');

        // Sayfa açıldığında verileri çek
        verileriYukle();

    </script>
</body>
</html>
